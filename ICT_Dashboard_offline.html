document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

"<!DOCTYPE html>\n<html lang=\"fr\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Diary of an ICT Trader<\u002Ftitle>\n<script>\n  /* Applique le thème avant le rendu pour éviter tout flash */\n  (function () {\n    try {\n      var t = localStorage.getItem(\"ict-theme\");\n      if (!t) t = (window.matchMedia && window.matchMedia(\"(prefers-color-scheme: dark)\").matches) ? \"dark\" : \"light\";\n      document.documentElement.setAttribute(\"data-theme\", t);\n    } catch (e) { document.documentElement.setAttribute(\"data-theme\", \"light\"); }\n  })();\n<\u002Fscript>\n<script src=\"8bd63b72-4a57-4316-b480-3761ad668831\"><\u002Fscript>\n<style>\n  :root {\n    --bg: #f3f5f9;\n    --bg2: #ffffff;\n    --bg3: #eceff5;\n    --bg-hover: #e3e8f0;\n    --border: rgba(15,23,42,0.09);\n    --border-strong: rgba(15,23,42,0.16);\n    --text: #0f172a;\n    --muted: #647189;\n    --green: #0c8f63;\n    --red: #d4364c;\n    --accent: #3a55d9;        /* accent structurel unique : indigo institutionnel */\n    --blue: #2f6feb;\n    --violet: #7458e8;\n    --green-bg: rgba(12,143,99,0.09);\n    --red-bg: rgba(212,54,76,0.08);\n    --accent-bg: rgba(58,85,217,0.08);\n    --grid: rgba(15,23,42,0.055);\n    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n    --mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;\n    --shadow: 0 1px 2px rgba(15,23,42,0.04), 0 2px 8px rgba(15,23,42,0.04);\n    --shadow-lg: 0 4px 16px rgba(15,23,42,0.08), 0 1px 3px rgba(15,23,42,0.06);\n    --topbar-bg: rgba(255,255,255,0.9);\n    --radius: 12px;\n  }\n  [data-theme=\"dark\"] {\n    --bg: #0a0e16;\n    --bg2: #131926;\n    --bg3: #1a2130;\n    --bg-hover: #222b3c;\n    --border: rgba(255,255,255,0.08);\n    --border-strong: rgba(255,255,255,0.15);\n    --text: #e8ecf4;\n    --muted: #8893a8;\n    --green: #2bbd7a;\n    --red: #f2546b;\n    --accent: #7088ff;\n    --blue: #5b89ff;\n    --violet: #9a86f5;\n    --green-bg: rgba(43,189,122,0.13);\n    --red-bg: rgba(242,84,107,0.12);\n    --accent-bg: rgba(112,136,255,0.14);\n    --grid: rgba(255,255,255,0.06);\n    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);\n    --shadow-lg: 0 6px 22px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.4);\n    --topbar-bg: rgba(10,14,22,0.9);\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body { transition: background-color .25s ease, color .25s ease; }\n  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } * { transition: none !important; } }\n\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--sans);\n    font-size: 14px;\n    line-height: 1.55;\n  }\n  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }\n\n  /* ---------- Header + nav ---------- */\n  .topbar {\n    position: sticky; top: 0; z-index: 50;\n    background: var(--topbar-bg);\n    backdrop-filter: blur(10px);\n    border-bottom: 1px solid var(--border);\n    padding: 14px 28px 0;\n  }\n  .topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }\n  .brand h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }\n  .brand--logo { display: flex; align-items: center; gap: 12px; }\n  .brand-mark { flex-shrink: 0; border-radius: 7px; }\n  .brand-text { display: flex; flex-direction: column; }\n  .brand .meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }\n  .badge {\n    font-size: 11px; color: var(--muted);\n    background: var(--bg3); border: 1px solid var(--border);\n    border-radius: 5px; padding: 2px 8px;\n  }\n  .badge--sim { color: var(--accent); background: var(--accent-bg); border-color: var(--accent); font-weight: 600; cursor: help; position: relative; }\n  .badge--sim:hover .badge-tip, .badge--sim:focus-visible .badge-tip { opacity: 1; visibility: visible; transform: translateY(0); }\n  .badge-tip {\n    position: absolute; top: calc(100% + 8px); left: 0; z-index: 60;\n    width: 250px; padding: 10px 12px; border-radius: 8px;\n    background: var(--bg2); border: 1px solid var(--border-strong); box-shadow: var(--shadow-lg);\n    color: var(--text); font-weight: 400; font-size: 11.5px; line-height: 1.55; text-transform: none; letter-spacing: 0;\n    opacity: 0; visibility: hidden; transform: translateY(-4px); transition: all .16s;\n  }\n  .period { text-align: right; }\n  .period .lbl { font-size: 11px; color: var(--muted); }\n  .period .val { font-size: 14px; font-weight: 500; }\n\n  .topbar-actions { display: flex; align-items: center; gap: 14px; }\n  .theme-toggle {\n    appearance: none; cursor: pointer; width: 34px; height: 34px; flex-shrink: 0;\n    border-radius: 8px; border: 1px solid var(--border); background: var(--bg3);\n    color: var(--muted); display: flex; align-items: center; justify-content: center;\n    transition: all .15s;\n  }\n  .theme-toggle:hover { color: var(--text); background: var(--bg-hover); border-color: var(--border-strong); }\n  .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }\n  .theme-toggle svg { width: 17px; height: 17px; }\n  [data-theme=\"dark\"] .theme-toggle .icon-moon { display: none; }\n  [data-theme=\"dark\"] .theme-toggle .icon-sun  { display: block; }\n  .theme-toggle .icon-sun { display: none; }\n\n  nav.tabs {\n    display: flex; gap: 2px; margin-top: 12px;\n    overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;\n  }\n  nav.tabs::-webkit-scrollbar { display: none; }\n  .tab {\n    appearance: none; background: none; border: none; cursor: pointer; white-space: nowrap;\n    font-family: var(--sans); font-size: 13px; font-weight: 500;\n    color: var(--muted); padding: 10px 14px 12px;\n    border-bottom: 2px solid transparent; border-radius: 6px 6px 0 0;\n    transition: color .15s, background .15s;\n  }\n  .tab:hover { color: var(--text); background: var( family:var(--mono); font-weight:600; }\n\n  /* ============================================================\n     MODERNISATION — ergonomie nav, tri tableau, sessions, errors\n     ============================================================ */\n\n  /* Animation d'entrée de vue */\n  .view.active { animation: viewIn .28s ease; }\n  @keyframes viewIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }\n\n  /* En-tête de section avec actions à droite */\n  .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }\n  .section-head h2 { margin-bottom: 0; }\n  .section-hint { font-size: 11px; color: var(--muted); }\n\n  /* Hover subtil sur cartes */\n  .stat-card, .error-card { transition: transform .15s, box-shadow .15s, border-color .15s; }\n  .stat-card:hover, .error-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }\n\n  /* Tableau triable */\n  thead th.sortable { cursor: pointer; user-select: none; white-space: nowrap; transition: color .15s; }\n  thead th.sortable:hover { color: var(--text); }\n  thead th.sortable .arrow { opacity: 0; font-size: 9px; margin-left: 3px; transition: opacity .15s; }\n  thead th.sortable:hover .arrow { opacity: .5; }\n  thead th.sortable[data-dir=\"asc\"] .arrow,\n  thead th.sortable[data-dir=\"desc\"] .arrow { opacity: 1; color: var(--accent); }\n  thead th.sortable[data-dir=\"asc\"] .arrow { display: inline-block; transform: rotate(180deg); }\n\n  /* Mini barre P/L dans le tableau */\n  .pl-cell { display: inline-flex; align-items: center; gap: 7px; justify-content: flex-end; }\n  .pl-bar { height: 5px; border-radius: 3px; min-width: 2px; opacity: .85; }\n  .pl-bar.pos { background: var(--green); }\n  .pl-bar.neg { background: var(--red); }\n\n  /* Filtres groupés */\n  .filter-bar { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }\n  .filter-group { display: fl  abandonné.<\u002Fp><\u002Fdiv>\n          <div class=\"panel panel--red\"><h4>Erreur #2<\u002Fh4><p>Deux trades invalidés manuellement · impatience · process non respecté.<\u002Fp><\u002Fdiv>\n          <div class=\"panel panel--red\"><h4>Erreur #3<\u002Fh4><p>Entrée trop haute dans le range → mauvais R:R · trop proche du 50% et au-dessus.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"callout mt\">\n          Le trade gagnant de la journée est celui qui a exécuté le <strong>plan initial<\u002Fstrong> (BISI 1H → target SIBI 4H atteint).\n          Les deux pertes viennent de l'abandon du plan. Détail des trades dans la Vue d'ensemble.\n        <\u002Fdiv>`\n    }\n  ],\n\n  rules: [\n    { label: \"Principe fondamental\", text: \"Un trader ICT ne réagit pas au prix — il anticipe le prix.\" },\n    { label: \"No revenge trading\", critical: true, text: \"Sizing fixe : 3 contrats toujours. Un stop loss ne justifie jamais d'augmenter la position suivante. Le résultat ne valide pas le process.\" },\n    { label: \"Invalidation OB\", text: \"Bougie CLOSE en dessous de 50% de l'OB → trade invalidé. Jamais sur la mèche.\" },\n    { label: \"Premium / Discount (PDA)\", text: \"Dans un PDA : en dessous du 50% = Premium · au-dessus = Discount. Logique inversée vs range.\" },\n    { label: \"Gestion des partiels\", text: \"Partiel → SL immédiat à BE. Stop dynamique : sous lower high, niveau OB, ou displacement.\" },\n    { label: \"News (8:30 ET)\", text: \"Entrée sur limit order uniquement — spike trop rapide pour confirmation LTF.\" },\n    { label: \"SMT Panel NQ\", text: \"YM / ES / NQ (tradés) · NVDA (primaire, non tradé) · AAPL (secondaire, non tradé).\" },\n    { label: \"Contrat dominant\", text: \"Toujours trader le contrat avec le plus de volume. Roll NQM26 → NQU26 vers le 17–18 juin.\" },\n    { label: \"Framework range\", text: \"0% SSL · 25% best buys · 50% EQL · 75% best sells · 100% BSL.\" },\n    { label: \"Modèle Unicorn (ICT)\", text: \"Displacement → FVG créé → prix revient dans le FVG → Breaker Block à l'intérieur ou adjacent. Confluence FVG + Breaker = setup à exécuter sans hésitation.\" },\n    { label: \"Hiérarchie des PDAs · Zone Discount\", text: \"Priorité 1 : GAP (premier PDA, bottom) · Priorité 2 : FVG/Unicorn · Priorité 3 : OB. Poser un ordre limite à chaque niveau dès la planification pré-marché.\" },\n    { label: \"Volume Imbalance · Effet aimant\", text: \"Tant qu'un corps de bougie ne traverse pas le Volume Imbalance, il agit comme un aimant. Seul un corps (jamais une mèche) qui le traverse en entier le neutralise.\" },\n    { label: \"Macro ICT · Fenêtre algorithmique\", text: \"Toutes les heures, entre :50 et :10 (ex : 7:50–8:10, 9:50–10:10…), l'algorithme prend de la liquidité ou atteint une efficience (FVG, SSL/BSL). Run-Stop-Run = pattern typique. Instrument préféré : ES (plus propre que NQ).\" },\n    { label: \"Kill Zones · Haute probabilité\", text: \"London KZ : 2h–5h ET · NY AM : 8h30–11h ET · London Close : 10h–12h ET. Un retour dans un FVG pendant une Kill Zone est une confluence ICT forte — l'algorithme agit à heures précises, pas au hasard.\" }\n  ],\n\n  /* ---- Concepts ICT (glossaire vivant) ---- */\n  concepts: [\n    { label: \"Sick Sister (sœur malade)\", text: \"Quand l'un des trois indices corrélés (YM / ES / NQ) manque de force ou d'énergie face au leader du mouvement : il ne parvient pas à suivre la tendance immédiate. Avec le temps, l'indice « malade » reprend des forces et se déplace en sympathie avec les deux autres — il est alors « tiré » par le plus fort. Lecture pratique : repérer l'indice à la traîne → anticiper son rattrapage en sympathie avec le leader (lié à la lecture SMT).\" },\n    { label: \"Macro (fenêtre :50–:10)\", text: \"Séquence temporelle courte et prédéterminée durant laquelle l'algorithme de marché active un mode de livraison spécifique. Les macros se produisent à chaque heure, environ entre :50 et :10 (ex. 7:50–8:10, 9:50–10:10…). Rôle opérationnel : initier un mouvement directionnel qui va chercher la liquidité au-delà des zones de protection établies lors de la session précédente. Exemple — la « lunch macro » (~11:50–12:10 ET) manipule les stops des traders profitables du matin pour offrir de la liquidité avant de poursuivre ou corriger la tendance. À retenir : ce n'est pas aléatoire mais un comportement algorithmique programmé sur le temps → permet d'anticiper renversements et accélérations avec précision.\" },\n    { label: \"New Week Opening Gap (NWOG)\", text: \"Définition : l'espace entre le prix de clôture du vendredi et le prix d'ouverture du dimanche soir. ICT maintient cette zone ombrée sur les graphiques pour identifier un niveau de liquidité et de juste valeur (fair value). Utilité comme filtre : sert de cadre pour définir un biais directionnel — en règle générale, chercher à acheter en dessous de l'ouverture du dimanche, et à vendre au-dessus. Application : valable en intraday comme sur plusieurs jours/semaines ; ce n'est pas une règle rigide interdisant le trade opposé mais un filtre pour repérer les opportunités les plus qualitatives. Juste valeur : zone de fair value prolongée — en marché haussier, le prix tend à respecter ces niveaux comme support après les avoir traversés ou lors des corrections. En résumé : un aimant / point d'appui algorithmique pour éviter le bruit et se concentrer sur les zones où la réaction institutionnelle est la plus probable.\" },\n    { label: \"Narratif (narrative)\", text: \"Comprendre trois éléments fondamentaux pour anticiper le comportement du marché : (1) ce que l'algorithme va faire ensuite dans le prix, (2) pourquoi il doit le faire, (3) quand il doit le faire.\" }\n  ],\n\n  /* ---- Erreurs documentées (semaine du 9–13 juin) ---- */\n  weeklyErrors: [\n    { type: \"critical\", title: \"Stop non structurel\",\n      occurrences: 2, days: \"12 juin T1 · T2\",\n      description: \"Stop Sierra par défaut (T1) ou serré sans référence structurelle (T2
