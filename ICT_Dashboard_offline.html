   }\n  ],\n\n  /* ---- Plan de la semaine (top-down) ---- */\n  weekPlan: {\n    date: \"Semaine du 16 juin 2026\", instrument: \"NQM26 · AAPL · NVDA\",\n    bias: \"Premium macro · long intraday NQ vers FIB 100 / AAPL rejet BSL · NVDA discount neutre\",\n    summary: \"Lecture top-down du dimanche 14 juin (NQ ~29,662 · AAPL 291.13 · NVDA 205.19). Contexte macro : AAPL a sweepé son BSL Weekly (~320) et rejette en large bougie bearish — actuellement sur le FIB 0.625 (291). NVDA en pullback depuis 240, niveau neutre sans signal clair. NQ : biais de fond short (Weekly premium), mais on laisse d'abord le prix prendre la liquidité du haut (4H FIB 100 ≈ 29,848 / BSL). Entrée intraday prioritaire : long sur retour en discount 15m + Breaker, cible FIB 100 4H. Le short macro ne se travaille qu'après la prise du high. Corrélation AAPL bearish renforce la prudence sur les longs NQ hors discount.\",\n    timeframes: [\n      { tf: \"NQ · Weekly\", title: \"Range macro · Premium\", img: \"plans/plan_14juin_weekly.png\",\n        note: \"Range hebdo clair, prix en premium. Biais de fond short : si continuation baissière, le setup short parfait se forme dans le premium. Ne shorter qu'après prise du BSL 29,848.\",\n        levels: [ { name: \"High range (BSL)\", val: \"30,800\" }, { name: \"Prix\", val: \"29,662\" }, { name: \"Low range (SSL)\", val: \"28,250\" } ] },\n      { tf: \"NQ · 4H\", title: \"Premium · objectif FIB 100\", img: \"plans/plan_14juin_4h.png\",\n        note: \"En premium du range 4H. Attente : prise du high du range = FIB 100 (BSL 29,848) avant tout retournement. Long intraday valide en discount 4H.\",\n        levels: [ { name: \"FIB 100 (BSL)\", val: \"29,848\" }, { name: \"FIB 75\", val: \"29,443\" }, { name: \"FIB 50 (EQ)\", val: \"29,038\" }, { name: \"FIB 25\", val: \"28,632\" }, { name: \"FIB 0 (SSL)\", val: \"28,228\" } ] },\n      { tf: \"NQ · 15m\", title: \"Entrée intraday · retour discount\", img: \"plans/plan_14juin_15m.png\",\n        note: \"Range 15m courant. Pour un long intraday : attendre un retour en discount, sous les traits rouges (~29,500 / EQ ~29,440). OB 15min + displacement 1m + FVG 1m = setup complet.\",\n        levels: [ { name: \"Zone premium\", val: \"> 29,500\" }, { name: \"Equilibrium\", val: \"29,440\" }, { name: \"Zone d'entrée long\", val: \"discount\" } ] },\n      { tf: \"NQ · 15m Breaker\", title: \"Confluence d'entrée\", img: \"plans/plan_14juin_15m_breaker.png\",\n        note: \"15m Breaker dans la zone : renforce le point d'entrée long sur le retour en discount. Confluence OB + FVG + Breaker = sizing plein.\",\n        levels: [ { name: \"15m Breaker\", val: \"29,560\" }, { name: \"FIB 75 4H\", val: \"29,443\" } ] },\n      { tf: \"AAPL · Weekly\", title: \"Rejet BSL · Distribution en premium\", img: \"plans/aapl_weekly_16juin.png\",\n        note: \"AAPL a sweepé le BSL Weekly (~320) cette semaine (H=317.40), puis rejeté avec une bougie bearish massive (C=291.13). Prix exactement sur le FIB 0.625 = zone premium. La structure suggère une distribution institutionnelle au BSL. Prochains aimants baissiers : FIB 0.5 (281) = EQL, puis FIB 0.375 (270). Corrélation : une continuation bearish AAPL sous 281 renforce le biais short NQ macro. Invalidation : clôture weekly > 310 (FIB 0.875).\",\n        levels: [\n          { name: \"BSL sweepé\", val: \"~320\" },\n          { name: \"FIB 0.875\", val: \"~310\" },\n          { name: \"FIB 0.75\", val: \"~300\" },\n          { name: \"FIB 0.625 (Prix)\", val: \"291.13\" },\n          { name: \"FIB 0.5 (EQL)\", val: \"~281\" },\n          { name: \"FIB 0.375\", val: \"~270\" },\n          { name: \"FIB 0.25 (best buys)\", val: \"~260\" },\n          { name: \"SSL (FIB 0%)\", val: \"243.42\" }\n        ] },\n      { tf: \"NVDA · Weekly\", title: \"Pullback depuis ATH · Zone neutre\", img: \"plans/nvda_weekly_16juin.png\",\n        note: \"NVDA a rallié depuis l'EQL à 164.07 jusqu'à ~240 (ATH récent), et pullback actuellement à 205.19. La structure des 2 dernières semaines est un retrace depuis les highs — pas de FIB dessiné, niveau neutre (mid-range). Le support clé à surveiller est le swing low à 164.07 (EQL/SSL). Pas de setup clair cette semaine : attendre soit une compression vers 164 pour un long de qualité, soit une reprise > 220 pour confirmation d'expansion. Pas de corrélation SMT NQ/NVDA identifiée à ce stade.\",\n        levels: [\n          { name: \"ATH récent (BSL)\", val: \"~240\" },\n          { name: \"Résistance\", val: \"220\" },\n          { name: \"Prix\", val: \"205.19\" },\n          { name: \"Support\", val: \"190\" },\n          { name: \"EQL / SSL clé\", val: \"164.07\" }\n        ] }\n    ]\n  },\n};\n\n/* =====================================================================\n   RENDU — tout est calculé depuis DATA, aucun chiffre dupliqué.\n   ===================================================================== */\nconst fmtUsd = n => (n < 0 ? \"−$\" : \"+$\") + Math.abs(n).toLocaleString(\"en-US\");\n\n/* --- Calculs de base --- */\nconst eq = DATA.equity;\nconst cumPl = eq[eq.length - 1].cum;\nconst dayPl = eq.length > 1 ? cumPl - eq[eq.length - 2].cum : cumPl;\n/* P/L numérique réel par trade (plNum, généré depuis Sierra). Fallback parseur si absent. */\nfunction plOf(t) {\n  if (typeof t.plNum === \"number\") return t.plNum;\n  if (!t.pl || t.pl === \"—\" || t.pl === \"+\" || t.pl === \"−\") return null;\n  const str = t.pl.replace(/[^\\d.]/g, \"\");\n  if (!str) return null;\n  return t.plClass === \"neg\" ? -parseFloat(str) : parseFloat(str);\n}\nconst wins        = DATA.trades.filter(t => plOf(t) > 0).length;\nconst losses      = DATA.trades.filter(t => plOf(t) < 0).length;\nconst closedTrades = wins + losses;\nconst winRate     = closedTrades ? Math.round(100 * wins / closedTrades) : 0;\n\nconst winPLs  = DATA.trades.map(plOf).filter(v => v !== null && v > 0);\nconst lossPLs = DATA.trades.map(plOf).filter(v => v !== null && v < 0);\nconst avgWin  = winPLs.length  ? winPLs.reduce((a,b) => a+b, 0) / winPLs.length : 0;\nconst avgLoss = lossPLs.length ? Math.abs(lossPLs.reduce((a,b) => a+b, 0) / lossPLs.length) : 0;\nconst winRateD = closedTrades ? wins / closedTrades : 0;\nconst expectancy = winRateD * avgWin - (1 - winRateD) * avgLoss;\nconst totalWins   = winPLs.reduce((a,b) => a+b, 0);\nconst totalLosses = Math.abs(lossPLs.reduce((a,b) => a+b, 0));\nconst profitFactor = totalLosses > 0 ? totalWins / totalLosses : 0;\n\n/* --- Helper couleurs liées au thème (pour les charts Canvas) --- */\nconst cssVar = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();\n\n/* --- Métriques de risque & R-multiples --- */\nconst oneR        = avgLoss > 0 ? avgLoss : 1;            // 1R = perte moyenne (proxy de risque)\nconst payoff      = avgLoss > 0 ? avgWin / avgLoss : 0;   // gain moyen / perte moyenne\nconst rExpectancy = oneR ? expectancy / oneR : 0;         // expectancy exprimée en R\nconst rOf = t => { const v = plOf(t); return v === null ? null : v / oneR; };\n\n/* --- Courbe d'equity trade-par-trade + max drawdown (révèle les creux intra-semaine) --- */\nconst tradeEquity = [];\n(() => {\n  let run = 0, peak = 0, maxDD = 0;\n  DATA.trades.forEach((t, i) => {\n    const v = plOf(t) || 0;\n    run += v; peak = Math.max(peak, run);\n    const dd = run - peak;                 // <= 0\n    if (dd < maxDD) maxDD = dd;\n    tradeEquity.push({ i, cum: run, peak, dd, pl: v, dirty: t.processClean === false, date: t.date });\n  });\n  tradeEquity.maxDD = Math.abs(maxDD);\n})();\nconst maxDrawdown = tradeEquity.maxDD;\n\n/* --- Process propre vs hors-process (impact $) --- */\nconst annotatedTrades = DATA.trades.filter(t => typeof t.processClean === \"boolean\");\nconst cleanTradesArr  = annotatedTrades.filter(t => t.processClean);\nconst dirtyTradesArr   = annotatedTrades.filter(t => !t.processClean);\nconst cleanNet = cleanTradesArr.reduce((a,t) => a + (plOf(t)||0), 0);\nconst dirtyNet = dirtyTradesArr.reduce((a,t) => a + (plOf(t)||0), 0);\nconst dirtyLossSum = dirtyTradesArr.filter(t => (plOf(t)||0) < 0).reduce((a,t) => a + (plOf(t)||0), 0);\n\n/* --- Métriques pro additionnelles --- */\nconst plValues      = DATA.trades.map(plOf).filter(v => v !== null);\nconst largestWin    = Math.max(0, ...plValues);\nconst largestLoss   = Math.min(0, ...plValues);\nconst concentration = totalWins > 0 ? Math.round(largestWin / totalWins * 100) : 0;     // % du gain brut issu du meilleur trade\nconst currentDD     = tradeEquity.length ? Math.abs(tradeEquity[tradeEquity.length - 1].dd) : 0;\nlet maxLosingStreak = 0, _curLose = 0;                                                   // pire série de pertes consécutives\nDATA.trades.forEach(t => { const v = plOf(t); if (v === null) return; if (v < 0) { _curLose++; maxLosingStreak = Math.max(maxLosingStreak, _curLose); } else if (v > 0) _curLose = 0; });\nconst processAdherence = annotatedTrades.length ? Math.round(100 * cleanTradesArr.length / annotatedTrades.length) : 0;\n\n/* --- KPIs --- */\ndocument.getElementById(\"period-label\").textContent = DATA.meta.periodStart + \" → \" + DATA.meta.periodEnd;\n\n/* Sparkline equity (SVG inline, indépendant de Chart.js) */\nconst spW = 240, spH = 52, spPad = 4;\nconst spCums = eq.map(p => p.cum);\nconst spMin = Math.min(0, ...spCums), spMax = Math.max(...spCums);\nconst spX = i => spPad + i * (spW - 2*spPad) / Math.max(1, eq.length - 1);\nconst spY = v => spH - spPad - (v - spMin) / ((spMax - spMin) || 1) * (spH - 2*spPad);\nconst spPts  = eq.map((p,i) => `${spX(i).toFixed(1)},${spY(p.cum).toFixed(1)}`).join(\" \");\nconst spArea = `${spPad.toFixed(1)},${(spH-spPad).toFixed(1)} ${spPts} ${(spW-spPad).toFixed(1)},${(spH-spPad).toFixed(1)}`;\n\ndocument.getElementById(\"hero-pl\").innerHTML = `\n  <div>\n    <div class=\"h-label\">Net P&amp;L\n      <span class=\"info\" tabindex=\"0\">i<span class=\"info-tip\">Somme des P/L <strong>réels<\u002Fstrong> exportés de Sierra Chart (Trade Activity Log) sur la période. Compte démo, valeurs réelles — aucune estimation.<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"h-value num ${cumPl>=0?'pos':'neg'}\" style=\"margin-top:10px\">${fmtUsd(cumPl)}<\u002Fdiv>\n  <\u002Fdiv>\n  <svg class=\"hero-spark\" viewBox=\"0 0 ${spW} ${spH}\" preserveAspectRatio=\"none\" aria-hidden=\"true\">\n    <polygon points=\"${spArea}\" fill=\"var(--green-bg)\"><\u002Fpolygon>\n    <polyline points=\"${spPts}\" fill=\"none\" stroke=\"var(--green)\" stroke-width=\"2\" stroke-linejoin=\"round\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n  <\u002Fsvg>\n  <div class=\"h-foot\">\n    <div class=\"it\"><div class=\"l\">Last session<\u002Fdiv><div class=\"v num ${dayPl>=0?'pos':'neg'}\">${fmtUsd(dayPl)}<\u002Fdiv><\u002Fdiv>\n    <div class=\"it\"><div class=\"l\">Avg R / trade<\u002Fdiv><div class=\"v num ${rExpectancy>=0?'pos':'neg'}\">${rExpectancy>=0?'+':'−'}${Math.abs(rExpectancy).toFixed(2)}R<\u002Fdiv><\u002Fdiv>\n    <div class=\"it\"><div class=\"l\">Max drawdown<\u002Fdiv><div class=\"v num neg\">−$${Math.round(maxDrawdown).toLocaleString(\"en-US\")}<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n`;\n\ndocument.getElementById(\"story-card\").innerHTML = `\n  <div class=\"s-title\">Your edge · win rate × payoff = expectancy<\u002Fdiv>\n  <div class=\"story-eq\">\n    <div class=\"story-term\"><div class=\"t-val num\">${winRate}%<\u002Fdiv><div class=\"t-lbl\">Win rate<\u002Fdiv><\u002Fdiv>\n    <div class=\"story-op\">×<\u002Fdiv>\n    <div class=\"story-term\"><div class=\"t-val num\">${payoff.toFixed(1)}:1<\u002Fdiv><div class=\"t-lbl\">Payoff<\u002Fdiv><\u002Fdiv>\n    <div class=\"story-op\">=<\u002Fdiv>\n    <div class=\"story-term\"><div class=\"t-val num ${expectancy>=0?'pos':'neg'}\">${expectancy>=0?'+':'−'}$${Math.round(Math.abs(expectancy)).toLocaleString(\"en-US\")}<\u002Fdiv><div class=\"t-lbl\">Expectancy<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"story-note\">Tu perds plus souvent que tu ne gagnes, mais chaque gain vaut en moyenne <strong>${payoff.toFixed(1)}×<\u002Fstrong> une perte. L'edge tient à l'<strong>asymétrie<\u002Fstrong>, pas à la fréquence — profit factor <strong>${profitFactor.toFixed(2)}×<\u002Fstrong>.<\u002Fdiv>\n`;\n\ndocument.getElementById(\"kpis\").innerHTML = `\n  <div class=\"kpi\"><div class=\"label\">Expectancy <span class=\"info\" tabindex=\"0\">i<span class=\"info-tip\">Gain attendu par trade : (win% × gain moyen) − (loss% × perte moyenne). Le chiffre d'edge le plus fiable, exprimé en $ et en R.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"value num ${expectancy >= 0 ? \"pos\" : \"neg\"}\">${expectancy >= 0 ? \"+\" : \"−\"}$${Math.round(Math.abs(expectancy)).toLocaleString(\"en-US\")}<\u002Fdiv><div class=\"sub\">${rExpectancy>=0?\"+\":\"−\"}${Math.abs(rExpectancy).toFixed(2)}R per trade<\u002Fdiv><\u002Fdiv>\n  <div class=\"kpi\"><div class=\"label\">Profit Factor<\u002Fdiv><div class=\"value num ${profitFactor >= 1.5 ? \"pos\" : profitFactor >= 1 ? \"acc\" : \"neg\"}\">${profitFactor.toFixed(2)}×<\u002Fdiv><div class=\"sub\">gross win / gross loss<\u002Fdiv><\u002Fdiv>\n  <div class=\"kpi\"><div class=\"label\">Win rate<\u002Fdiv><div class=\"value num\">${winRate}%<\u002Fdiv><div class=\"sub\">${wins}W / ${losses}L · ${closedTrades} trades<\u002Fdiv><\u002Fdiv>\n  <div class=\"kpi\"><div class=\"label\">Payoff ratio <span class=\"info\" tabindex=\"0\">i<span class=\"info-tip\">Gain moyen ÷ perte moyenne. Un payoff &gt; 1 signifie que les gains dépassent les pertes en taille — d'où un edge même avec un win rate &lt; 50%.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"value num\">${payoff.toFixed(1)}:1<\u002Fdiv><div class=\"sub\">+$${Math.round(avgWin).toLocaleString(\"en-US\")} avg win / −$${Math.round(avgLoss).toLocaleString(\"en-US\")} avg loss<\u002Fdiv><\u002Fdiv>\n  <div class=\"kpi\"><div class=\"label\">Max drawdown <span class=\"info\" tabindex=\"0\">i<span class=\"info-tip\">Plus forte baisse pic-à-creux de l'equity <strong>trade-par-trade<\u002Fstrong>. Mesure le pire enchaînement subi sur la période.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"value num neg\">−$${Math.round(maxDrawdown).toLocaleString(\"en-US\")}<\u002Fdiv><div class=\"sub\">peak-to-trough · current −$${Math.round(currentDD).toLocaleString(\"en-US\")}<\u002Fdiv><\u002Fdiv>\n  <div class=\"kpi\"><div class=\"label\">Max losing streak <span class=\"info\" tabindex=\"0\">i<span class=\"info-tip\">Plus longue série de pertes consécutives. Indicateur de risque de ruine et de résistance psychologique requise.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"value num ${maxLosingStreak>=4?\"neg\":\"\"}\">${maxLosingStreak}<\u002Fdiv><div class=\"sub\">consecutive losses · worst run<\u002Fdiv><\u002Fdiv>\n  <div class=\"kpi\"><div class=\"label\">Process adherence <span class=\"info\" tabindex=\"0\">i<span class=\"info-tip\">Part des trades exécutés dans le respect complet du process (setup + stop structurel + sizing + Kill Zone). La métrique reine d'un journal pro : le process avant le résultat.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"value num ${processAdherence>=60?\"pos\":processAdherence>=40?\"acc\":\"neg\"}\">${processAdherence}%<\u002Fdiv><div class=\"sub\">clean / ${annotatedTrades.length} annotated trades<\u002Fdiv><\u002Fdiv>\n`;\n\n/* --- Jauge drawdown vs limite (prop firm) --- */\nconst ddGaugeEl = document.getElementById(\"dd-gauge\");\nif (ddGaugeEl) {\n  const limit = Math.abs(DATA.meta.maxDrawdownLimit || 0);\n  if (limit > 0) {\n    const used = Math.min(100, Math.round(maxDrawdown / limit * 100));\n    const buffer = Math.max(0, limit - maxDrawdown);\n    const cls = used >= 80 ? \"danger\" : used >= 50 ? \"warn\" : \"ok\";\n    ddGaugeEl.innerHTML = `\n      <div class=\"dd-gauge-head\">\n        <span class=\"t\">Max drawdown vs limite<\u002Fspan>\n        <span class=\"v\">atteint <strong>−$${Math.round(maxDrawdown).toLocaleString(\"en-US\")}<\u002Fstrong> / limite <strong>−$${limit.toLocaleString(\"en-US\")}<\u002Fstrong><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dd-track\"><div class=\"dd-fill ${cls}\" style=\"width:${used}%\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"dd-gauge-foot\">\n        <span>${used}% de la limite utilisée<\u002Fspan>\n        <span>buffer restant : $${Math.round(buffer).toLocaleString(\"en-US\")}<\u002Fspan>\n      <\u002Fdiv>`;\n  }\n}\n\n/* --- Stats section --- */\nconst statsEl = document.getElementById(\"stats-section\");\nif (statsEl) {\n  statsEl.innerHTML = `\n  <div class=\"section\">\n    <div class=\"section-head\"><h2>Period statistics · ${DATA.meta.periodStart} → ${DATA.meta.periodEnd}<\u002Fh2><span class=\"section-hint\">métriques de détail · complètent le scorecard ci-dessus<\u002Fspan><\u002Fdiv>\n    <div class=\"stats-grid\">\n      <div class=\"stat-card\"><div class=\"lbl\">Avg win / trade<\u002Fdiv><div class=\"val num pos\">+$${Math.round(avgWin).toLocaleString(\"en-US\")}<\u002Fdiv><div class=\"sub\">${winPLs.length} winning trade${winPLs.length>1?\"s\":\"\"}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"lbl\">Avg loss / trade<\u002Fdiv><div class=\"val num neg\">−$${Math.round(avgLoss).toLocaleString(\"en-US\")}<\u002Fdiv><div class=\"sub\">${lossPLs.length} SL hit${lossPLs.length>1?\"s\":\"\"}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"lbl\">Largest win<\u002Fdiv><div class=\"val num pos\">+$${Math.round(largestWin).toLocaleString(\"en-US\")}<\u002Fdiv><div class=\"sub\">${DATA.bestTrade.sub}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"lbl\">Largest loss<\u002Fdiv><div class=\"val num neg\">−$${Math.round(Math.abs(largestLoss)).toLocaleString(\"en-US\")}<\u002Fdiv><div class=\"sub\">single worst trade<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"lbl\">Concentration <span class=\"info\" tabindex=\"0\">i<span class=\"info-tip\">Part du gain brut issue du <strong>seul meilleur trade<\u002Fstrong>. Au-delà de ~40%, l'edge dépend trop d'un coup unique : signe de fragilité.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"val num ${concentration>=40?\"acc\":\"\"}\">${concentration}%<\u002Fdiv><div class=\"sub\">du gain brut · meilleur trade<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"lbl\">Max risk engaged<\u002Fdiv><div class=\"val num neg\">${fmtUsd(DATA.meta.riskMaxDay.value)}<\u002Fdiv><div class=\"sub\">${DATA.meta.riskMaxDay.sub}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"lbl\">Total fills<\u002Fdiv><div class=\"val num\">${DATA.meta.fills}<\u002Fdiv><div class=\"sub\">Sierra · Trade Activity Log<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* --- Trade log : filtres groupés + tri par colonne --- */\nconst instruments = [...new Set(DATA.trades.map(t => t.instr))];\nconst killzones   = [...new Set(DATA.trades.map(t => t.kz).filter(Boolean))];\nconst maxAbsPL    = Math.max(...DATA.trades.map(t => Math.abs(plOf(t) || 0)), 1);\n\nconst dirTag = d => `<span class=\"tag ${d === \"Long\" ? \"tag-long\" : \"tag-short\"}\">${d}<\u002Fspan>`;\nconst resTag = r => `<span class=\"tag ${r === \"Win\" ? \"tag-win\" : \"tag-loss\"}\">${r}<\u002Fspan>`;\nfunction tradeMetaHtml(t) {\n  if (t.mood === undefined) return \"\";\n  return '<br><span style=\"margin-top:6px;display:inline-flex;gap:12px;flex-wrap:wrap;font-size:12px;\">' +\n    '<span><strong>Setup type:<\u002Fstrong> ' + (t.setupType||\"—\") + '<\u002Fspan>' +\n    '<span><strong>Kill Zone:<\u002Fstrong> ' + (t.kz||\"—\") + '<\u002Fspan>' +\n    '<span><strong>Mood:<\u002Fstrong> <em>' + (t.mood||\"—\") + '<\u002Fem><\u002Fspan>' +\n    '<span><strong>Process:<\u002Fstrong> <span class=\"' + (t.processClean ? \"pos\" : \"neg\") + '\">' + (t.processClean ? \"✅ Clean\" : \"❌ Dirty\") + '<\u002Fspan><\u002Fspan>' +\n    '<\u002Fspan>';\n}\nfunction rPill(t) {\n  const r = rOf(t);\n  if (r === null) return `<span class=\"r-pill flat\">—<\u002Fspan>`;\n  const cls = r > 0 ? \"pos\" : r < 0 ? \"neg\" : \"flat\";\n  return `<span class=\"r-pill ${cls}\">${r >= 0 ? \"+\" : \"−\"}${Math.abs(r).toFixed(1)}R<\u002Fspan>`;\n}\nfunction plCell(t) {\n  const v = plOf(t) || 0;\n  const w = Math.max(2, Math.round(Math.abs(v) / maxAbsPL * 46));\n  return `<span class=\"pl-cell\"><span class=\"${t.plClass} num\">${t.pl}<\u002Fspan><span class=\"pl-bar ${v>=0?'pos':'neg'}\" style=\"width:${w}px\"><\u002Fspan><\u002Fspan>`;\n}\nfunction procDot(t) {\n  if (typeof t.processClean !== \"boolean\") return `<span class=\"proc-dot na\" title=\"Process non annoté\"><\u002Fspan>`;\n  return `<span class=\"proc-dot ${t.processClean?'clean':'dirty'}\" title=\"${t.processClean?'Process propre':'Hors-process (dirty)'}\"><\u002Fspan>`;\n}\n\nconst tradeState = { instr:\"all\", result:\"all\", kz:\"all\", proc:\"all\", sortKey:\"date\", sortDir:\"asc\" };\n\nconst filterEl = document.getElementById(\"trade-filters\");\nfilterEl.innerHTML = `\n  <div class=\"filter-group\">\n    <span class=\"filter-lbl\">Instr.<\u002Fspan>\n    <button class=\"filter-btn active\" data-dim=\"instr\" data-val=\"all\">All<\u002Fbutton>\n    ${instruments.map(i => `<button class=\"filter-btn\" data-dim=\"instr\" data-val=\"${i}\">${i}<\u002Fbutton>`).join(\"\")}\n  <\u002Fdiv>\n  <span class=\"filter-divider\"><\u002Fspan>\n  <div class=\"filter-group\">\n    <span class=\"filter-lbl\">Result<\u002Fspan>\n    <button class=\"filter-btn active\" data-dim=\"result\" data-val=\"all\">All<\u002Fbutton>\n    <button class=\"filter-btn\" data-dim=\"result\" data-val=\"Win\"><span class=\"idot green\"><\u002Fspan>Win<\u002Fbutton>\n    <button class=\"filter-btn\" data-dim=\"result\" data-val=\"Perte\"><span class=\"idot red\"><\u002Fspan>Loss<\u002Fbutton>\n  <\u002Fdiv>\n  <span class=\"filter-divider\"><\u002Fspan>\n  <div class=\"filter-group\">\n    <span class=\"filter-lbl\">Kill Zone<\u002Fspan>\n    <button class=\"filter-btn active\" data-dim=\"kz\" data-val=\"all\">All<\u002Fbutton>\n    ${killzones.map(k => `<button class=\"filter-btn\" data-dim=\"kz\" data-val=\"${k}\">${k}<\u002Fbutton>`).join(\"\")}\n  <\u002Fdiv>\n  <span class=\"filter-divider\"><\u002Fspan>\n  <div class=\"filter-group\">\n    <span class=\"filter-lbl\">Process<\u002Fspan>\n    <button class=\"filter-btn active\" data-dim=\"proc\" data-val=\"all\">All<\u002Fbutton>\n    <button class=\"filter-btn\" data-dim=\"proc\" data-val=\"clean\">● Clean<\u002Fbutton>\n    <button class=\"filter-btn\" data-dim=\"proc\" data-val=\"dirty\">● Dirty<\u002Fbutton>\n  <\u002Fdiv>\n  <span class=\"trade-count\" id=\"trade-count\"><\u002Fspan>\n`;\n\nfunction tradeMatches(t) {\n  if (tradeState.instr  !== \"all\" && t.instr  !== tradeState.instr)  return false;\n  if (tradeState.result !== \"all\" && t.result !== tradeState.result) return false;\n  if (tradeState.kz     !== \"all\" && t.kz     !== tradeState.kz)     return false;\n  if (tradeState.proc === \"clean\" && t.processClean !== true)  return false;\n  if (tradeState.proc === \"dirty\" && t.processClean !== false) return false;\n  return true;\n}\n\nfunction renderTrades() {\n  const dir = tradeState.sortDir === \"asc\" ? 1 : -1;\n  const idx = DATA.trades.map((t,i) => i).filter(i => tradeMatches(DATA.trades[i]));\n  idx.sort((a,b) => {\n    if (tradeState.sortKey === \"date\") return (a - b) * dir;\n    const va = plOf(DATA.trades[a]), vb = plOf(DATA.trades[b]);\n    const na = va === null, nb = vb === null;\n    if (na && nb) return a - b;\n    if (na) return 1; if (nb) return -1;          // null P/L toujours en bas\n    return (va - vb) * dir;\n  });\n  document.getElementById(\"trade-log\").innerHTML = idx.map(i => {\n    const t = DATA.trades[i];\n    return `\n    <tr class=\"trade-row\" data-i=\"${i}\" tabindex=\"0\" aria-expanded=\"false\">\n      <td><span class=\"caret\">▶<\u002Fspan><\u002Ftd>\n      <td>${t.date}<\u002Ftd>\n      <td>${t.instr}<\u002Ftd>\n      <td>${dirTag(t.dir)}<\u002Ftd>\n      <td class=\"r num\">${t.entry}<\u002Ftd>\n      <td class=\"r num\">${t.exit}<\u002Ftd>\n      <td class=\"r\">${rPill(t)}<\u002Ftd>\n      <td class=\"r\">${plCell(t)}<\u002Ftd>\n      <td><span style=\"display:inline-flex;align-items:center;gap:7px\">${resTag(t.result)}${procDot(t)}<\u002Fspan><\u002Ftd>\n    <\u002Ftr>\n    <tr class=\"trade-detail\" hidden>\n      <td colspan=\"9\"><div class=\"detail-inner\">\n        <strong>Setup:<\u002Fstrong> ${t.setup}<br>\n        <strong>Notes:<\u002Fstrong> ${t.notes}${tradeMetaHtml(t)}\n      <\u002Fdiv><\u002Ftd>\n    <\u002Ftr>`;\n  }).join(\"\");\n\n  const cnt = document.getElementById(\"trade-count\");\n  if (cnt) cnt.innerHTML = `<strong>${idx.length}<\u002Fstrong> / ${DATA.trades.length} trades affichés`;\n\n  document.querySelectorAll(\".trade-row\").forEach(row => {\n    const toggle = () => {\n      const detail = row.nextElementSibling;\n      const open = detail.hidden;\n      detail.hidden = !open;\n      row.classList.toggle(\"open\", open);\n      row.setAttribute(\"aria-expanded\", open);\n    };\n    row.addEventListener(\"click\", toggle);\n    row.addEventListener(\"keydown\", e => { if (e.key === \"Enter\" || e.key === \" \") { e.preventDefault(); toggle(); } });\n  });\n}\n\nfilterEl.querySelectorAll(\".filter-btn\").forEach(btn => {\n  btn.addEventListener(\"click\", () => {\n    const dim = btn.dataset.dim;\n    filterEl.querySelectorAll(`.filter-btn[data-dim=\"${dim}\"]`).forEach(b => b.classList.remove(\"active\"));\n    btn.classList.add(\"active\");\n    tradeState[dim] = btn.dataset.val;\n    renderTrades();\n  });\n});\n\ndocument.querySelectorAll(\"th.sortable\").forEach(th => {\n  th.addEventListener(\"click\", () => {\n    const key = th.dataset.sort === \"r\" ? \"pl\" : th.dataset.sort;   // R et P/L trient à l'identique\n    if (tradeState.sortKey === key) {\n      tradeState.sortDir = tradeState.sortDir === \"asc\" ? \"desc\" : \"asc\";\n    } else {\n      tradeState.sortKey = key;\n      tradeState.sortDir = key === \"date\" ? \"asc\" : \"desc\";\n    }\n    document.querySelectorAll(\"th.sortable\").forEach(o => {\n      const isActive = (o.dataset.sort === \"date\" && key === \"date\") ||\n                       ((o.dataset.sort === \"pl\" || o.dataset.sort === \"r\") && key === \"pl\");\n      if (isActive) o.setAttribute(\"data-dir\", tradeState.sortDir);\n      else o.removeAttribute(\"data-dir\");\n    });\n    renderTrades();\n  });\n});\n\nrenderTrades();\n\n/* --- Export CSV du trade log --- */\nconst exportBtn = document.getElementById(\"export-csv\");\nif (exportBtn) {\n  exportBtn.addEventListener(\"click\", () => {\n    const cols = [\"Date\",\"Instrument\",\"Direction\",\"Entry\",\"Exit\",\"P/L ($)\",\"R\",\"Result\",\"Setup\",\"Kill Zone\",\"Process\",\"Notes\"];\n    const esc = v => { v = (v == null ? \"\" : String(v)); return /[\",\\n]/.test(v) ? '\"' + v.replace(/\"/g, '\"\"') + '\"' : v; };\n    const lines = DATA.trades.map(t => {\n      const r = rOf(t), pl = plOf(t);\n      return [t.date, t.instr, t.dir, t.entry, t.exit, pl == null ? \"\" : pl, r == null ? \"\" : r.toFixed(2),\n              t.result, t.setupType || t.setup || \"\", t.kz || \"\",\n              typeof t.processClean === \"boolean\" ? (t.processClean ? \"Clean\" : \"Dirty\") : \"\",\n              t.notes || \"\"].map(esc).join(\",\");\n    });\n    const csv = \"\\ufeff\" + cols.join(\",\") + \"\\n\" + lines.join(\"\\n\");\n    const blob = new Blob([csv], { type: \"text/csv;charset=utf-8\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url;\n    a.download = \"ict_trade_log_\" + (DATA.meta.periodEnd || \"export\").replace(/\\s+/g, \"_\") + \".csv\";\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  });\n}\n\n/* --- Sessions (accordéon, la plus récente ouverte) --- */\ndocument.getElementById(\"sessions\").innerHTML = DATA.sessions.map((s, i) => `\n  <details class=\"session\" id=\"session-${i}\" ${i === 0 ? \"open\" : \"\"}>\n    <summary class=\"session-head\">\n      <div class=\"session-id\">\n        <span class=\"session-date\">${s.date}<\u002Fspan>\n        <span class=\"session-status session-status--${s.status === \"live\" ? \"live\" : \"closed\"}\">${s.statusLabel}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"session-pl num ${s.pl ? (s.pl.startsWith('+') ? \"pos\" : \"neg\") : \"\"}\">${s.pl ?? \"—\"}<span class=\"s\">${s.plSub}<\u002Fspan><\u002Fdiv>\n    <\u002Fsummary>\n    <div class=\"session-body\">${s.html}<\u002Fdiv>\n  <\u002Fdetails>\n`).join(\"\");\n\n/* --- Rail de navigation rapide des sessions (jump + scrollspy + tout déplier) --- */\nconst railEl = document.getElementById(\"session-rail\");\nif (railEl) {\n  railEl.innerHTML = `<span class=\"rail-lbl\">Aller à<\u002Fspan>` + DATA.sessions.map((s, i) => {\n    const live = s.status === \"live\";\n    const dotCls = live ? \"live\" : (s.pl ? (s.pl.startsWith(\"+\") ? \"pos\" : \"neg\") : \"\");\n    const shortDate = s.date.replace(\" 2026\", \"\");\n    return `<button class=\"rail-chip ${live ? \"live\" : \"\"}\" data-target=\"session-${i}\" data-idx=\"${i}\">\n      <span class=\"dot ${dotCls}\"><\u002Fspan>${shortDate}${s.pl ? ` · <span class=\"num\">${s.pl}<\u002Fspan>` : \"\"}\n    <\u002Fbutton>`;\n  }).join(\"\") + `<button class=\"rail-action\" id=\"rail-toggle-all\">Tout déplier<\u002Fbutton>`;\n\n  const chips = [...railEl.querySelectorAll(\".rail-chip\")];\n  chips.forEach(chip => {\n    chip.addEventListener(\"click\", () => {\n      const el = document.getElementById(chip.dataset.target);\n      if (!el) return;\n      el.open = true;\n      const y = el.getBoundingClientRect().top + window.pageYOffset - 150;\n      window.scrollTo({ top: y, behavior: \"smooth\" });\n    });\n  });\n\n  /* Tout déplier / replier */\n  const toggleAll = document.getElementById(\"rail-toggle-all\");\n  if (toggleAll) {\n    toggleAll.addEventListener(\"click\", () => {\n      const details = [...document.querySelectorAll(\"details.session\")];\n      const anyClosed = details.some(d => !d.open);\n      details.forEach(d => d.open = anyClosed);\n      toggleAll.textContent = anyClosed ? \"Tout replier\" : \"Tout déplier\";\n    });\n  }\n\n  /* Scrollspy : surligne le chip de la session la plus proche du haut */\n  let spyTick = false;\n  function updateSpy() {\n    spyTick = false;\n    const sessionsView = document.getElementById(\"view-sessions\");\n    if (!sessionsView || !sessionsView.classList.contains(\"active\")) return;\n    let bestIdx = 0, bestDist = Infinity;\n    DATA.sessions.forEach((s, i) => {\n      const el = document.getElementById(\"session-\" + i);\n      if (!el) return;\n      const dist = Math.abs(el.getBoundingClientRect().top - 160);\n      if (dist < bestDist) { bestDist = dist; bestIdx = i; }\n    });\n    chips.forEach(c => c.classList.toggle(\"active\", +c.dataset.idx === bestIdx));\n  }\n  window.addEventListener(\"scroll\", () => {\n    if (!spyTick) { spyTick = true; requestAnimationFrame(updateSpy); }\n  }, { passive: true });\n  updateSpy();\n}\n\n/* --- Règles : non-négociables (critiques) puis opérationnelles --- */\n(() => {\n  const crit = DATA.rules.filter(r => r.critical);\n  const norm = DATA.rules.filter(r => !r.critical);\n  const card = r => `<div class=\"rule ${r.critical ? \"rule--critical\" : \"\"}\"><h4>${r.label}<\u002Fh4><p>${r.text}<\u002Fp><\u002Fdiv>`;\n  const group = (title, dotCls, arr) => arr.length\n    ? `<div class=\"group-title\"><span class=\"gt-dot ${dotCls}\"><\u002Fspan>${title}<span class=\"gt-count\">${arr.length}<\u002Fspan><span class=\"gt-line\"><\u002Fspan><\u002Fdiv>` + arr.map(card).join(\"\")\n    : \"\";\n  document.getElementById(\"rules\").innerHTML =\n    group(\"Non-négociables\", \"bad\", crit) +\n    group(\"Règles opérationnelles\", \"accent\", norm);\n})();\n\n/* --- Concepts : glossaire avec recherche --- */\nconst conceptsEl = document.getElementById(\"concepts\");\nconst conceptCount = document.getElementById(\"concept-count\");\nconst conceptSearch = document.getElementById(\"concept-search\");\nif (conceptsEl && DATA.concepts) {\n  const initial = label => label.trim().charAt(0).toUpperCase();\n  function renderConcepts(q = \"\") {\n    const needle = q.trim().toLowerCase();\n    const list = DATA.concepts.filter(c =>\n      !needle || c.label.toLowerCase().includes(needle) || c.text.toLowerCase().includes(needle));\n    if (!list.length) {\n      conceptsEl.innerHTML = `<div class=\"empty-state\"><div class=\"es-ic\">🔍<\u002Fdiv>Aucun concept ne correspond à «&nbsp;${q}&nbsp;».<\u002Fdiv>`;\n    } else {\n      conceptsEl.innerHTML = list.map(c => `\n        <div class=\"concept\">\n          <div class=\"c-term\"><span class=\"c-ic\">${initial(c.label)}<\u002Fspan>${c.label}<\u002Fdiv>\n          <div class=\"c-def\">${c.text}<\u002Fdiv>\n        <\u002Fdiv>`).join(\"\");\n    }\n    if (conceptCount) conceptCount.innerHTML = `<strong>${list.length}<\u002Fstrong> / ${DATA.concepts.length} concept${DATA.concepts.length > 1 ? \"s\" : \"\"}`;\n  }\n  renderConcepts();\n  if (conceptSearch) conceptSearch.addEventListener(\"input\", e => renderConcepts(e.target.value));\n}\n\n/* --- Erreurs tab --- */\nconst errorEl = document.getElementById(\"error-tracker\");\nif (errorEl && DATA.weeklyErrors) {\n  const cards = DATA.weeklyErrors.map(e => `\n    <div class=\"error-card ${e.type}\">\n      <div class=\"ec-head\">\n        <div class=\"ec-title\"><span class=\"idot ${e.type === \"critical\" ? \"red\" : \"accent\"}\"><\u002Fspan>${e.title}<\u002Fdiv>\n        <span class=\"ec-badge\">${e.occurrences}× · ${e.days}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ec-body\">${e.description}<\u002Fdiv>\n      <div class=\"ec-rule\"><strong>Correct rule<\u002Fstrong>${e.rule}<\u002Fdiv>\n      <div class=\"ec-cost\">Cost: <strong>${e.costStr}<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>`).join(\"\");\n\n  const rtRows = (DATA.ruleCompliance || []).map(r => {\n    const total = r.violations + r.ok;\n    const pct   = total > 0 ? Math.round(r.ok / total * 100) : 100;\n    const cls   = pct === 100 ? \"ok\" : pct >= 67 ? \"warn\" : \"bad\";\n    const label = pct === 100 ? \"✅ 0 violation\" : `${r.violations} violation${r.violations > 1 ? \"s\" : \"\"}`;\n    return `<div class=\"rt-item\">\n      <div class=\"rt-label\">${r.label}<\u002Fdiv>\n      <div class=\"rt-bar\"><div class=\"rt-fill ${cls}\" style=\"width:${pct}%\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"rt-badge ${cls}\">${label}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join(\"\");\n\n  const critical = DATA.weeklyErrors.filter(e => e.type === \"critical\").length;\n  const warnings = DATA.weeklyErrors.filter(e => e.type === \"warning\").length;\n  const perfect  = (DATA.ruleCompliance || []).filter(r => r.violations === 0).length;\n\n  /* Coût des violations de process (chiffres réels Sierra) */\n  const dirtyN = dirtyTradesArr.length, cleanN = cleanTradesArr.length;\n  const biggestDirtyLoss = dirtyTradesArr\n    .filter(t => (plOf(t)||0) < 0)\n    .sort((a,b) => (plOf(a)||0) - (plOf(b)||0))[0];\n  const potentialPL = cumPl - dirtyLossSum;                 // dirtyLossSum est négatif\n  const pctActual   = potentialPL ? Math.round(cumPl / potentialPL * 100) : 100;\n  const pctRecover  = 100 - pctActual;\n\n  errorEl.innerHTML = `\n  <p class=\"view-intro\">Suivi des erreurs de la semaine et de leur <strong>coût réel<\u002Fstrong>. L'edge est en place — la marge de progression est comportementale, pas technique.<\u002Fp>\n  <div class=\"kpis\" style=\"margin-bottom:18px;\">\n    <div class=\"kpi\"><div class=\"label\">Critical errors<\u002Fdiv><div class=\"value num neg\">${critical}<\u002Fdiv><div class=\"sub\">Top priority to fix<\u002Fdiv><\u002Fdiv>\n    <div class=\"kpi\"><div class=\"label\">Warnings<\u002Fdiv><div class=\"value num acc\">${warnings}<\u002Fdiv><div class=\"sub\">Eliminate progressively<\u002Fdiv><\u002Fdiv>\n    <div class=\"kpi\"><div class=\"label\">Rules respected<\u002Fdiv><div class=\"value num pos\">${perfect} / ${(DATA.ruleCompliance||[]).length}<\u002Fdiv><div class=\"sub\">No violations this week<\u002Fdiv><\u002Fdiv>\n    <div class=\"kpi\"><div class=\"label\">Dominant pattern<\u002Fdiv><div class=\"value\" style=\"font-size:14px;font-weight:600;color:var(--red)\">Default stop<\u002Fdiv><div class=\"sub\">2 violations · cost −$3,870<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"section-head\">\n      <h2>Coût des violations de process<\u002Fh2>\n      <span class=\"section-hint\">P/L réel des trades hors-process vs process propre · données Sierra<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cost-grid\">\n      <div class=\"cost-card bad\">\n        <div class=\"c-lbl\">Trades hors-process<\u002Fdiv>\n        <div class=\"c-val num neg\">${dirtyN}<\u002Fdiv>\n        <div class=\"c-sub\">sur ${dirtyN + cleanN} trades annotés · P/L net <span class=\"num ${dirtyNet>=0?'pos':'neg'}\">${fmtUsd(Math.round(dirtyNet))}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cost-card bad\">\n        <div class=\"c-lbl\">Pertes encaissées hors-process<\u002Fdiv>\n        <div class=\"c-val num neg\">${fmtUsd(Math.round(dirtyLossSum))}<\u002Fdiv>\n        <div class=\"c-sub\">dont le revenge sizing du 10 juin : <span class=\"num neg\">${biggestDirtyLoss ? biggestDirtyLoss.pl : \"—\"}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cost-card good\">\n        <div class=\"c-lbl\">P/L net process propre<\u002Fdiv>\n        <div class=\"c-val num pos\">${fmtUsd(Math.round(cleanNet))}<\u002Fdiv>\n        <div class=\"c-sub\">${cleanN} trades respectant le process complet<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:18px;\">\n      <div class=\"section-hint\" style=\"margin-bottom:8px;\">Et si les pertes hors-process avaient été évitées&nbsp;?<\u002Fdiv>\n      <div class=\"whatif-bar\">\n        <div class=\"whatif-seg\" style=\"width:${pctActual}%;background:var(--green)\">${fmtUsd(cumPl)} réel<\u002Fdiv>\n        <div class=\"whatif-seg\" style=\"width:${pctRecover}%;background:var(--accent)\">+$${Math.abs(Math.round(dirtyLossSum)).toLocaleString(\"en-US\")} récupérables<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c-sub\" style=\"margin-top:9px;font-size:12px;\">Potentiel <strong class=\"num\">${fmtUsd(Math.round(potentialPL))}<\u002Fstrong> sans les pertes hors-process — soit <strong>+${pctRecover}%<\u002Fstrong> de performance laissée sur la table par l'indiscipline. L'edge est déjà là&nbsp;; la marge de progression est <strong>comportementale<\u002Fstrong>, pas technique.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <h2>Documented errors · Week of ${DATA.meta.periodStart} → ${DATA.meta.periodEnd}<\u002Fh2>\n    <div class=\"error-grid\">${cards}<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\" style=\"margin-top:18px;\">\n    <h2>ICT rule compliance · ${(DATA.ruleCompliance||[]).length} rules tracked<\u002Fh2>\n    <div class=\"rule-tracker\">${rtRows}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* --- Onglets : navigation, persistance (hash + storage), clavier --- */\nvar chartInstances = [];   /* hoisté : utilisé par activateView avant le rendu des charts */\nconst tabs = [...document.querySelectorAll(\".tab\")];\nconst validViews = tabs.map(t => t.dataset.view);\n\nfunction activateView(name, { push = true } = {}) {\n  if (!validViews.includes(name)) name = \"overview\";\n  tabs.forEach(t => {\n    const sel = t.dataset.view === name;\n    t.setAttribute(\"aria-selected\", sel);\n    t.setAttribute(\"tabindex\", sel ? \"0\" : \"-1\");\n  });\n  document.querySelectorAll(\".view\").forEach(v => v.classList.remove(\"active\"));\n  document.getElementById(\"view-\" + name).classList.add(\"active\");\n  if (push) {\n    try { localStorage.setItem(\"ict-tab\", name); } catch (e) {}\n    if (location.hash !== \"#\" + name) history.replaceState(null, \"\", \"#\" + name);\n  }\n  if (name === \"overview\") chartInstances.forEach(c => c.resize());\n}\n\ntabs.forEach((tab, i) => {\n  tab.addEventListener(\"click\", () => activateView(tab.dataset.view));\n  tab.addEventListener(\"keydown\", e => {\n    let j = null;\n    if (e.key === \"ArrowRight\")     j = (i + 1) % tabs.length;\n    else if (e.key === \"ArrowLeft\") j = (i - 1 + tabs.length) % tabs.length;\n    else if (e.key === \"Home\")      j = 0;\n    else if (e.key === \"End\")       j = tabs.length - 1;\n    if (j !== null) { e.preventDefault(); tabs[j].focus(); activateView(tabs[j].dataset.view); }\n  });\n});\n\n/* Vue initiale : hash > storage > overview */\nlet storedTab = null;\ntry { storedTab = localStorage.getItem(\"ict-tab\"); } catch (e) {}\nconst initView = (location.hash || \"\").replace(\"#\", \"\") || storedTab || \"overview\";\nactivateView(initView, { push: false });\nwindow.addEventListener(\"hashchange\", () => activateView((location.hash || \"\").replace(\"#\", \"\"), { push: false }));\n\n/* --- Toggle thème clair / sombre --- */\nconst themeToggle = document.getElementById(\"theme-toggle\");\nif (themeToggle) {\n  themeToggle.addEventListener(\"click\", () => {\n    const next = document.documentElement.getAttribute(\"data-theme\") === \"dark\" ? \"light\" : \"dark\";\n    document.documentElement.setAttribute(\"data-theme\", next);\n    try { localStorage.setItem(\"ict-theme\", next); } catch (e) {}\n    buildCharts();\n  });\n}\n\n/* --- Courbe P/L (fallback natif si Chart.js indisponible : fichier utilisable hors-ligne) --- */\nfunction drawFallbackChart(canvas) {\n  const dpr = window.devicePixelRatio || 1;\n  const w = canvas.parentElement.clientWidth, h = canvas.parentElement.clientHeight;\n  canvas.width = w * dpr; canvas.height = h * dpr;\n  canvas.style.width = w + \"px\"; canvas.style.height = h + \"px\";\n  const c = canvas.getContext(\"2d\"); c.scale(dpr, dpr);\n  const cMuted = cssVar(\"--muted\"), cGreen = cssVar(\"--green\"), cGreenBg = cssVar(\"--green-bg\"), cGrid = cssVar(\"--grid\");\n  const pad = { l: 52, r: 16, t: 12, b: 28 };\n  const xs = i => pad.l + i * (w - pad.l - pad.r) / (eq.length - 1);\n  const max = Math.max(...eq.map(p => p.cum)) * 1.08;\n  const ys = v => pad.t + (1 - v / max) * (h - pad.t - pad.b);\n  c.strokeStyle = cGrid; c.fillStyle = cMuted;\n  c.font = \"11px 'IBM Plex Mono', monospace\"; c.textAlign = \"right\";\n  for (let g = 0; g <= 4; g++) {\n    const v = max * g / 4, y = ys(v);\n    c.beginPath(); c.moveTo(pad.l, y); c.lineTo(w - pad.r, y); c.stroke();\n    c.fillText(\"$\" + Math.round(v / 1000) + \"k\", pad.l - 8, y + 4);\n  }\n  c.textAlign = \"center\";\n  eq.forEach((p, i) => c.fillText(p.date, xs(i), h - 8));\n  c.beginPath();\n  eq.forEach((p, i) => i ? c.lineTo(xs(i), ys(p.cum)) : c.moveTo(xs(i), ys(p.cum)));\n  c.strokeStyle = cGreen; c.lineWidth = 2; c.stroke();\n  c.lineTo(xs(eq.length - 1), ys(0)); c.lineTo(xs(0), ys(0)); c.closePath();\n  c.fillStyle = cGreenBg; c.fill();\n  c.fillStyle = cGreen;\n  eq.forEach((p, i) => { c.beginPath(); c.arc(xs(i), ys(p.cum), 4, 0, 7); c.fill(); });\n}\n\nconst plCanvas = document.getElementById(\"plChart\");\nconst dailyCanvas = document.getElementById(\"dailyChart\");\nconst equityCanvas = document.getElementById(\"equityChart\");\n\nfunction buildCharts() {\n  if (typeof Chart === \"undefined\") {\n    drawFallbackChart(plCanvas);\n    window.addEventListener(\"resize\", () => drawFallbackChart(plCanvas));\n    return;\n  }\n  chartInstances.forEach(c => c.destroy());\n  chartInstances = [];\n\n  const cGreen = cssVar(\"--green\"), cRed = cssVar(\"--red\");\n  const cMuted = cssVar(\"--muted\"), cGrid = cssVar(\"--grid\"), cBorder = cssVar(\"--border-strong\");\n  const cGreenBg = cssVar(\"--green-bg\"), cRedBg = cssVar(\"--red-bg\");\n  const mono = \"'IBM Plex Mono', monospace\";\n  const axis = extra => Object.assign({\n    ticks: { color: cMuted, font: { size: 11, family: mono } },\n    grid: { color: cGrid }, border: { color: cBorder }\n  }, extra || {});\n\n  /* Courbe cumulée (par session) */\n  chartInstances.push(new Chart(plCanvas.getContext(\"2d\"), {\n    type: \"line\",\n    data: { labels: eq.map(p => p.date), datasets: [{\n      data: eq.map(p => p.cum), borderColor: cGreen, backgroundColor: cGreenBg,\n      borderWidth: 2, pointBackgroundColor: cGreen, pointRadius: 4, fill: true, tension: 0.3 }] },\n    options: { responsive: true, maintainAspectRatio: false,\n      plugins: { legend: { display: false },\n        tooltip: { callbacks: { label: c => {\n          const i = c.dataIndex; const delta = i === 0 ? c.parsed.y : c.parsed.y - eq[i-1].cum;\n          return [`Cumulative: $${c.parsed.y.toLocaleString(\"en-US\")}`, `Day: ${delta >= 0 ? \"+\" : \"\"}$${delta.toLocaleString(\"en-US\")}`];\n        }}}},\n      scales: { x: axis(), y: axis({ ticks: { color: cMuted, font: { size: 11, family: mono }, callback: v => \"$\" + (v/1000).toFixed(0) + \"k\" } }) }\n    }\n  }));\n\n  /* Barres P/L journalier */\n  if (dailyCanvas) {\n    const dailyPL = eq.map((p, i) => i === 0 ? p.cum : p.cum - eq[i-1].cum);\n    chartInstances.push(new Chart(dailyCanvas.getContext(\"2d\"), {\n      type: \"bar\",\n      data: { labels: eq.map(p => p.date), datasets: [{\n        data: dailyPL,\n        backgroundColor: dailyPL.map(v => v >= 0 ? cGreenBg : cRedBg),\n        borderColor: dailyPL.map(v => v >= 0 ? cGreen : cRed),\n        borderWidth: 1.5, borderRadius: 4 }] },\n      options: { responsive: true, maintainAspectRatio: false,\n        plugins: { legend: { display: false },\n          tooltip: { callbacks: { label: c => `${c.parsed.y >= 0 ? \"+\" : \"\"}$${Math.round(c.parsed.y).toLocaleString(\"en-US\")}` }}},\n        scales: { x: axis(), y: axis({ ticks: { color: cMuted, font: { size: 11, family: mono }, callback: v => (v >= 0 ? \"+\" : \"\") + \"$\" + (v/1000).toFixed(0) + \"k\" } }) }\n      }\n    }));\n  }\n\n  /* Equity trade-par-trade + drawdown + marqueurs hors-process */\n  if (equityCanvas) {\n    chartInstances.push(new Chart(equityCanvas.getContext(\"2d\"), {\n      type: \"line\",\n      data: { labels: tradeEquity.map((p,i) => \"T\" + (i+1)), datasets: [\n        { label: \"Peak\", data: tradeEquity.map(p => p.peak),\n          borderColor: cMuted, borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false, tension: 0 },\n        { label: \"Equity\", data: tradeEquity.map(p => p.cum),\n          borderColor: cGreen, borderWidth: 2, backgroundColor: cRedBg, fill: \"-1\", tension: 0.2,\n          pointRadius: tradeEquity.map(p => p.dirty ? 5 : 2),\n          pointHoverRadius: tradeEquity.map(p => p.dirty ? 7 : 4),\n          pointBackgroundColor: tradeEquity.map(p => p.dirty ? cRed : cGreen),\n          pointBorderColor: tradeEquity.map(p => p.dirty ? cRed : cGreen),\n          pointBorderWidth: tradeEquity.map(p => p.dirty ? 2 : 0) }\n      ]},\n      options: { responsive: true, maintainAspectRatio: false,\n        plugins: { legend: { display: false },\n          tooltip: { filter: item => item.datasetIndex === 1, callbacks: {\n            title: items => { const p = tradeEquity[items[0].dataIndex]; return `Trade ${items[0].dataIndex+1} · ${p.date}`; },\n            label: c => {\n              const p = tradeEquity[c.dataIndex];\n              const lines = [\n                `Equity: $${Math.round(p.cum).toLocaleString(\"en-US\")}`,\n                `Trade P/L: ${p.pl >= 0 ? \"+\" : \"−\"}$${Math.abs(Math.round(p.pl)).toLocaleString(\"en-US\")}`\n              ];\n              if (p.dd < 0) lines.push(`Drawdown: −$${Math.abs(Math.round(p.dd)).toLocaleString(\"en-US\")}`);\n              if (p.dirty) lines.push(\"⚠ Trade hors-process\");\n              return lines;\n            }\n          }}},\n        scales: {\n          x: axis({ ticks: { color: cMuted, font: { size: 10, family: mono }, autoSkip: true, maxTicksLimit: 14 } }),\n          y: axis({ ticks: { color: cMuted, font: { size: 11, family: mono }, callback: v => \"$\" + (v/1000).toFixed(0) + \"k\" } })\n        }\n      }\n    }));\n  }\n\n  /* Drawdown underwater — drawdown ($) au fil des trades */\n  const underwaterCanvas = document.getElementById(\"underwaterChart\");\n  if (underwaterCanvas) {\n    chartInstances.push(new Chart(underwaterCanvas.getContext(\"2d\"), {\n      type: \"line\",\n      data: { labels: tradeEquity.map((p,i) => \"T\" + (i+1)), datasets: [{\n        data: tradeEquity.map(p => p.dd),\n        borderColor: cRed, borderWidth: 1.5, backgroundColor: cRedBg, fill: true, tension: 0.2,\n        pointRadius: 0, pointHoverRadius: 4 }] },\n      options: { responsive: true, maintainAspectRatio: false,\n        plugins: { legend: { display: false },\n          tooltip: { callbacks: {\n            title: items => \"Trade \" + (items[0].dataIndex + 1) + \" · \" + tradeEquity[items[0].dataIndex].date,\n            label: c => c.parsed.y < 0 ? `Drawdown: −$${Math.abs(Math.round(c.parsed.y)).toLocaleString(\"en-US\")}` : \"Au plus haut (0)\"\n          }}},\n        scales: {\n          x: axis({ ticks: { color: cMuted, font: { size: 10, family: mono }, autoSkip: true, maxTicksLimit: 14 } }),\n          y: axis({ max: 0, ticks: { color: cMuted, font: { size: 11, family: mono }, callback: v => \"−$\" + Math.abs(v/1000).toFixed(0) + \"k\" } })\n        }\n      }\n    }));\n  }\n\n  /* Distribution des R-multiples — la forme de l'edge */\n  const rDistCanvas = document.getElementById(\"rDistChart\");\n  if (rDistCanvas) {\n    const bins = [\n      { lbl: \"< −2R\",   min: -Infinity, max: -2, pos: false },\n      { lbl: \"−2..−1R\", min: -2, max: -1, pos: false },\n      { lbl: \"−1..0R\",  min: -1, max: 0,  pos: false },\n      { lbl: \"0..1R\",   min: 0,  max: 1,  pos: true },\n      { lbl: \"1..2R\",   min: 1,  max: 2,  pos: true },\n      { lbl: \"2..3R\",   min: 2,  max: 3,  pos: true },\n      { lbl: \"3..5R\",   min: 3,  max: 5,  pos: true },\n      { lbl: \"> 5R\",    min: 5,  max: Infinity, pos: true },\n    ];\n    const rvals = DATA.trades.map(rOf).filter(v => v !== null);\n    const counts = bins.map(b => rvals.filter(v => v > b.min && v <= b.max).length);\n    chartInstances.push(new Chart(rDistCanvas.getContext(\"2d\"), {\n      type: \"bar\",\n      data: { labels: bins.map(b => b.lbl), datasets: [{\n        data: counts,\n        backgroundColor: bins.map(b => b.pos ? cGreenBg : cRedBg),\n        borderColor: bins.map(b => b.pos ? cGreen : cRed),\n        borderWidth: 1.5, borderRadius: 4 }] },\n      options: { responsive: true, maintainAspectRatio: false,\n        plugins: { legend: { display: false },\n          tooltip: { callbacks: { label: c => `${c.parsed.y} trade${c.parsed.y > 1 ? \"s\" : \"\"}` }}},\n        scales: {\n          x: axis({ ticks: { color: cMuted, font: { size: 10, family: mono } } }),\n          y: axis({ ticks: { color: cMuted, font: { size: 11, family: mono }, precision: 0, stepSize: 1 } })\n        }\n      }\n    }));\n  }\n}\n\n/* --- Performance tab (calculé dynamiquement depuis les trades réels) --- */\nfunction computeWeeklyStats(trades) {\n  const isWin = t => plOf(t) > 0;\n  const group = (keyFn, withPL) => {\n    const map = {};\n    trades.forEach(t => {\n      const k = keyFn(t);\n      if (!k) return;\n      if (!map[k]) map[k] = { key: k, trades: 0, wins: 0, losses: 0, totalPL: 0 };\n      map[k].trades++;\n      const v = plOf(t) || 0;\n      if (v > 0) map[k].wins++; else if (v < 0) map[k].losses++;\n      if (withPL) map[k].totalPL += v;\n    });\n    return Object.values(map);\n  };\n  const setupPerf = group(t => t.setupType, true)\n    .map(g => ({ setup: g.key, trades: g.trades, wins: g.wins, losses: g.losses, totalPL: Math.round(g.totalPL) }))\n    .sort((a, b) => b.totalPL - a.totalPL);\n  const kzPerf = group(t => t.kz, false)\n    .map(g => ({ kz: g.key, trades: g.trades, wins: g.wins, losses: g.losses }));\n  const moodPerf = group(t => t.mood, false)\n    .map(g => ({ mood: g.key, trades: g.trades, wins: g.wins, losses: g.losses }));\n\n  // Streak process propre (trades annotés uniquement)\n  const annotated = trades.filter(t => typeof t.processClean === \"boolean\");\n  const detail = annotated.map(t => ({ date: t.date, clean: t.processClean }));\n  let current = 0;\n  for (let i = detail.length - 1; i >= 0 && detail[i].clean; i--) current++;\n  let longest = 0, run = 0;\n  detail.forEach(d => { run = d.clean ? run + 1 : 0; longest = Math.max(longest, run); });\n\n  // Violations par jour (processClean === false)\n  const byDay = {};\n  annotated.forEach(t => {\n    if (!byDay[t.date]) byDay[t.date] = 0;\n    if (t.processClean === false) byDay[t.date]++;\n  });\n  const violationEvolution = Object.keys(byDay).map(d => ({ session: d, violations: byDay[d] }));\n\n  const dates = trades.map(t => t.date);\n  const week = dates.length ? `${dates[0]} → ${dates[dates.length - 1]}` : \"\";\n\n  // Performance par jour de semaine (dérivée des dates · juin 2026)\n  const weekdayName = [\"Sun\", \"Mon\", \"Tue\", \"Wed\", \"Thu\", \"Fri\", \"Sat\"];\n  const dayOrder = { Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6, Sun: 7 };\n  const weekdayOf = t => { const d = parseInt(t.date, 10); if (!d) return null; return weekdayName[new Date(2026, 5, d).getDay()]; };\n  const dayPerf = group(weekdayOf, true)\n    .map(g => ({ day: g.key, trades: g.trades, wins: g.wins, losses: g.losses, totalPL: Math.round(g.totalPL) }))\n    .sort((a, b) => (dayOrder[a.day] || 9) - (dayOrder[b.day] || 9));\n\n  return { setupPerf, kzPerf, moodPerf, dayPerf,\n           processStreak: { current, longest, detail }, violationEvolution, week };\n}\n\nconst perfEl = document.getElementById(\"perf-content\");\nif (perfEl) {\n  const ws = computeWeeklyStats(DATA.trades);\n\n  // Setup performance table\n  const setupRows = ws.setupPerf.map(s => {\n    const total = s.wins + s.losses;\n    const wr = total ? Math.round(100 * s.wins / total) : 0;\n    const cls = wr >= 67 ? \"good\" : wr >= 40 ? \"mid\" : \"bad\";\n    const plStr = s.totalPL !== 0 ? (s.totalPL > 0 ? `<span class=\"pos num\">+$${s.totalPL.toLocaleString(\"en-US\")}<\u002Fspan>` : `<span class=\"neg num\">−$${Math.abs(s.totalPL).toLocaleString(\"en-US\")}<\u002Fspan>`) : \"<span class='muted'>—<\u002Fspan>\";\n    return `<tr>\n      <td><strong>${s.setup}<\u002Fstrong><\u002Ftd>\n      <td class=\"num\" style=\"text-align:center\">${s.trades}<\u002Ftd>\n      <td><div class=\"wr-bar-wrap\"><div class=\"wr-bar\"><div class=\"wr-fill ${cls}\" style=\"width:${wr}%\"><\u002Fdiv><\u002Fdiv><span class=\"num\" style=\"font-size:12px;min-width:34px\">${wr}%<\u002Fspan><\u002Fdiv><\u002Ftd>\n      <td>${plStr}<\u002Ftd>\n    <\u002Ftr>`;\n  }).join(\"\");\n\n  // KZ performance table\n  const kzRows = ws.kzPerf.map(k => {\n    const total = k.wins + k.losses;\n    const wr = total ? Math.round(100 * k.wins / total) : 0;\n    const cls = wr >= 67 ? \"good\" : wr >= 40 ? \"mid\" : \"bad\";\n    const kzDot = cls === \"good\" ? \"green\" : cls === \"mid\" ? \"accent\" : \"red\";\n    return `<tr>\n      <td><strong><span class=\"idot ${kzDot}\"><\u002Fspan>${k.kz}<\u002Fstrong><\u002Ftd>\n      <td class=\"num\" style=\"text-align:center\">${k.trades}<\u002Ftd>\n      <td><div class=\"wr-bar-wrap\"><div class=\"wr-bar\"><div class=\"wr-fill ${cls}\" style=\"width:${wr}%\"><\u002Fdiv><\u002Fdiv><span class=\"num\" style=\"font-size:12px;min-width:34px\">${wr}%<\u002Fspan><\u002Fdiv><\u002Ftd>\n      <td class=\"num\" style=\"text-align:center\">${k.wins}W / ${k.losses}L<\u002Ftd>\n    <\u002Ftr>`;\n  }).join(\"\");\n\n  // Weekday performance table\n  const dayRows = ws.dayPerf.map(d => {\n    const total = d.wins + d.losses;\n    const wr = total ? Math.round(100 * d.wins / total) : 0;\n    const cls = wr >= 67 ? \"good\" : wr >= 40 ? \"mid\" : \"bad\";\n    const plStr = d.totalPL !== 0 ? (d.totalPL > 0 ? `<span class=\"pos num\">+$${d.totalPL.toLocaleString(\"en-US\")}<\u002Fspan>` : `<span class=\"neg num\">−$${Math.abs(d.totalPL).toLocaleString(\"en-US\")}<\u002Fspan>`) : \"<span class='muted'>—<\u002Fspan>\";\n    return `<tr>\n      <td><strong>${d.day}<\u002Fstrong><\u002Ftd>\n      <td class=\"num\" style=\"text-align:center\">${d.trades}<\u002Ftd>\n      <td><div class=\"wr-bar-wrap\"><div class=\"wr-bar\"><div class=\"wr-fill ${cls}\" style=\"width:${wr}%\"><\u002Fdiv><\u002Fdiv><span class=\"num\" style=\"font-size:12px;min-width:34px\">${wr}%<\u002Fspan><\u002Fdiv><\u002Ftd>\n      <td>${plStr}<\u002Ftd>\n    <\u002Ftr>`;\n  }).join(\"\");\n\n  // Streak dots\n  const dots = ws.processStreak.detail.map(d =>\n    `<div class=\"streak-dot ${d.clean ? \"clean\" : \"dirty\"}\" title=\"${d.date}\">${d.clean ? \"✓\" : \"✗\"}<\u002Fdiv>`\n  ).join(\"\");\n\n  // Mood bars\n  const moodColors = { \"Confiant\": \"var(--green)\", \"Neutre\": \"var(--blue)\", \"Impatient\": \"var(--red)\", \"FOMO\": \"var(--red)\", \"Revenge\": \"var(--violet)\" };\n  const moodRows = ws.moodPerf.map(m => {\n    const total = m.wins + m.losses;\n    const wr = total ? Math.round(100 * m.wins / total) : 0;\n    const color = moodColors[m.mood] || \"var(--muted)\";\n    return `<div class=\"mood-row\">\n      <div class=\"mood-name\">${m.mood}<\u002Fdiv>\n      <div class=\"mood-bar-wrap\"><div class=\"mood-fill\" style=\"width:${wr}%;background:${color}\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"mood-meta\">${m.wins}W/${m.losses}L · ${wr}%<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join(\"\");\n\n  // Violation evolution bars\n  const maxV = Math.max(...ws.violationEvolution.map(v => v.violations), 1);\n  const volBars = ws.violationEvolution.map(v => {\n    const h = Math.max(8, Math.round(v.violations / maxV * 80));\n    const cls = v.violations === 0 ? \"zero\" : v.violations === 1 ? \"low\" : \"high\";\n    const sess = v.session.replace(\" juin\",\"j\");\n    return `<div class=\"vol-bar-col\">\n      <div class=\"vol-count ${v.violations === 0 ? \"pos\" : v.violations >= 2 ? \"neg\" : \"acc\"}\">${v.violations}<\u002Fdiv>\n      <div class=\"vol-bar ${cls}\" style=\"height:${h}px\"><\u002Fdiv>\n      <div class=\"vol-lbl\">${sess}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join(\"\");\n\n  // Best setup by WR (min 2 trades) then by totalPL\n  const bestSetup = ws.setupPerf\n    .filter(s => s.trades >= 1 && s.wins > 0)\n    .sort((a,b) => {\n      const wrA = a.wins/a.trades, wrB = b.wins/b.trades;\n      if (wrB !== wrA) return wrB - wrA;\n      return (b.totalPL||0) - (a.totalPL||0);\n    })[0] || ws.setupPerf[0];\n\n  // Streak KPI\n  const cleanTrades = ws.processStreak.detail.filter(d => d.clean).length;\n  const processRate = Math.round(100 * cleanTrades / ws.processStreak.detail.length);\n\n  perfEl.innerHTML = `\n  <p class=\"view-intro\">Performance par setup, Kill Zone, état émotionnel et discipline de process — calculée depuis tes trades réels Sierra.<\u002Fp>\n  <div class=\"kpis\" style=\"margin-bottom:18px;\">\n    <div class=\"kpi\">\n      <div class=\"label\">Process adherence<\u002Fdiv>\n      <div class=\"value num ${processRate >= 60 ? \"pos\" : \"acc\"}\">${processRate}%<\u002Fdiv>\n      <div class=\"sub\">${cleanTrades} / ${ws.processStreak.detail.length} trades<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"label\">Current streak<\u002Fdiv>\n      <div class=\"value num pos\">${ws.processStreak.current} ✓<\u002Fdiv>\n      <div class=\"sub\">consecutive clean process trade(s)<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"label\">Best streak<\u002Fdiv>\n      <div class=\"value num acc\">${ws.processStreak.longest}<\u002Fdiv>\n      <div class=\"sub\">consecutive this week<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\">\n      <div class=\"label\">Most reliable setup<\u002Fdiv>\n      <div class=\"value\" style=\"font-size:14px;font-weight:600;color:var(--green)\">${bestSetup.setup}<\u002Fdiv>\n      <div class=\"sub\">${bestSetup.wins}/${bestSetup.trades} win · ${Math.round(100*bestSetup.wins/bestSetup.trades)}% WR<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\">\n    <div class=\"section-head\"><h2>R-multiple distribution<\u002Fh2><span class=\"section-hint\">la forme de l'edge · pertes plafonnées à ~−1R, gains étalés à droite<\u002Fspan><\u002Fdiv>\n    <div class=\"chart-wrap-sm\" style=\"height:190px\">\n      <canvas id=\"rDistChart\" role=\"img\" aria-label=\"R-multiple distribution\"><\u002Fcanvas>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"perf-grid\">\n    <div class=\"section\">\n      <h2>Setup performance<\u002Fh2>\n      <div class=\"table-scroll\">\n      <table class=\"perf-table\">\n        <thead><tr><th>Setup<\u002Fth><th style=\"text-align:center\">Trades<\u002Fth><th>Win Rate<\u002Fth><th>Total P/L<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>${setupRows}<\u002Ftbody>\n      <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>Kill Zone performance<\u002Fh2>\n      <div class=\"table-scroll\">\n      <table class=\"perf-table\">\n        <thead><tr><th>Kill Zone<\u002Fth><th style=\"text-align:center\">Trades<\u002Fth><th>Win Rate<\u002Fth><th style=\"text-align:center\">Result<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>${kzRows}<\u002Ftbody>\n      <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>Performance by weekday<\u002Fh2>\n      <div class=\"table-scroll\">\n      <table class=\"perf-table\">\n        <thead><tr><th>Day<\u002Fth><th style=\"text-align:center\">Trades<\u002Fth><th>Win Rate<\u002Fth><th>Total P/L<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>${dayRows}<\u002Ftbody>\n      <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>Process discipline streak<\u002Fh2>\n      <p style=\"font-size:12px;color:var(--muted);margin-bottom:8px;\">Each trade: ✓ = process respected (setup + structural SL + sizing + KZ) · ✗ = violation<\u002Fp>\n      <div class=\"streak-row\">${dots}<\u002Fdiv>\n      <div class=\"streak-label\" style=\"margin-top:8px;\">Current streak: <strong>${ws.processStreak.current}<\u002Fstrong> · Best streak: <strong>${ws.processStreak.longest}<\u002Fstrong> · Overall rate: <strong class=\"${processRate >= 60 ? \"pos\" : \"acc\"}\">${processRate}%<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>Psychology<\u002Fh2>\n      <p style=\"font-size:12px;color:var(--muted);margin-bottom:10px;\">Corrélation état émotionnel → résultat<\u002Fp>\n      ${moodRows}\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section\" style=\"margin-top:18px;\">\n    <h2>ICT violations trend · Sessions ${ws.week}<\u002Fh2>\n    <p style=\"font-size:12px;color:var(--muted);margin-bottom:8px;\">Number of ICT rules violated per session (target = 0)<\u002Fp>\n    <div class=\"vol-bars\">${volBars}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* --- Backtest tab --- */\nconst btEl = document.getElementById(\"backtest-content\");\nif (btEl) {\n  if (!DATA.backtests || DATA.backtests.length === 0) {\n    btEl.innerHTML = `\n    <div class=\"bt-empty\">\n      <div class=\"bt-empty-icon\">📊<\u002Fdiv>\n      <p><strong>No backtests recorded yet.<\u002Fstrong><br>\n      Share a screenshot + your comments and I'll add it here.<\u002Fp>\n    <\u002Fdiv>`;\n  } else {\n    const resultLabel = { valid: \"Valid setup\", invalid: \"Invalid setup\", neutral: \"Neutral / Mixed\" };\n    const nBt = DATA.backtests.length;\n    const nValid = DATA.backtests.filter(b => b.result === \"valid\").length;\n    const btHeader = `<p class=\"view-intro\">Bibliothèque de setups backtestés — captures annotées, logique du trade et leçons à répliquer. <strong>${nBt}<\u002Fstrong> entrée${nBt > 1 ? \"s\" : \"\"}${nValid ? ` · <span class=\"pos\">${nValid} validé${nValid > 1 ? \"s\" : \"\"}<\u002Fspan>` : \"\"}.<\u002Fp>`;\n    btEl.innerHTML = btHeader + DATA.backtests.map(bt => {\n      const imgs = (bt.images || []).map(img => `\n        <div class=\"bt-img-wrap\">\n          <img src=\"${img.src}\" alt=\"${img.caption||''}\" data-caption=\"${img.caption||''}\"\n               onclick=\"document.getElementById('bt-lightbox-img').src=this.src;\n                        document.getElementById('bt-lightbox').classList.add('open')\">\n          ${img.caption ? `<div class=\"bt-img-caption\">${img.caption}<\u002Fdiv>` : ''}\n        <\u002Fdiv>`).join('');\n\n      const lessons = (bt.lessons || []).map(l =>\n        `<div class=\"bt-lesson ${l.type||''}\"><strong>${l.type === 'pos' ? 'Strength' : l.type === 'neg' ? 'Error' : 'Note'}<\u002Fstrong>${l.text}<\u002Fdiv>`\n      ).join('');\n\n      const tags = [\n        bt.instrument ? `<span class=\"bt-tag\">${bt.instrument}<\u002Fspan>` : '',\n        bt.timeframe  ? `<span class=\"bt-tag\">${bt.timeframe}<\u002Fspan>`  : '',\n        bt.setup      ? `<span class=\"bt-tag\">${bt.setup}<\u002Fspan>`      : '',\n        bt.result     ? `<span class=\"bt-tag ${bt.result}\">${resultLabel[bt.result]||bt.result}<\u002Fspan>` : '',\n      ].filter(Boolean).join('');\n\n      return `\n      <div class=\"bt-entry\">\n        <div class=\"bt-entry-head\">\n          <div class=\"bt-entry-date\">📅 ${bt.date}<\u002Fdiv>\n          <div class=\"bt-entry-meta\">${tags}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bt-body\">\n          ${bt.title ? `<div class=\"bt-title\">${bt.title}<\u002Fdiv>` : ''}\n          ${bt.comment ? `<div class=\"bt-comment ${bt.result||''}\">${bt.comment}<\u002Fdiv>` : ''}\n          ${lessons ? `<div class=\"bt-lessons\">${lessons}<\u002Fdiv>` : ''}\n          ${imgs ? `<div class=\"bt-gallery\">${imgs}<\u002Fdiv>` : ''}\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    }).join('');\n  }\n}\n\n/* Lightbox close */\nconst lbClose = document.getElementById(\"bt-lightbox-close\");\nconst lb      = document.getElementById(\"bt-lightbox\");\nif (lbClose && lb) {\n  lbClose.addEventListener(\"click\", () => lb.classList.remove(\"open\"));\n  lb.addEventListener(\"click\", e => { if (e.target === lb) lb.classList.remove(\"open\"); });\n  document.addEventListener(\"keydown\", e => { if (e.key === \"Escape\") lb.classList.remove(\"open\"); });\n}\n\n/* --- Helpers images (lightbox + placeholder) --- */\nfunction openLightbox(src) {\n  const img = document.getElementById(\"bt-lightbox-img\");\n  const lb  = document.getElementById(\"bt-lightbox\");\n  if (img && lb) { img.src = src; lb.classList.add(\"open\"); }\n}\nfunction planImgFail(el) {\n  const ph = document.createElement(\"div\");\n  ph.className = \"ph\";\n  ph.innerHTML = \"Image manquante<br>(\" + (el.getAttribute(\"data-ph\") || \"\") + \")\";\n  el.replaceWith(ph);\n}\n\n/* --- Plan de la semaine --- */\nconst planEl = document.getElementById(\"plan-content\");\nif (planEl && DATA.weekPlan) {\n  const wp = DATA.weekPlan;\n  const cards = wp.timeframes.map(tf => {\n    const img = `<div class=\"ph\">Capture top-down<br><span style=\"font-size:11px;opacity:.7\">disponible dans la version connectée<\u002Fspan><\u002Fdiv>`;\n    const levels = (tf.levels || []).map(l =>\n      `<div class=\"plan-lvl\"><span class=\"lv-name\">${l.name}<\u002Fspan><span class=\"lv-val num\">${l.val}<\u002Fspan><\u002Fdiv>`).join(\"\");\n    return `<div class=\"plan-tf\">\n      <div class=\"plan-tf-head\"><span class=\"plan-tf-badge\">${tf.tf}<\u002Fspan><span class=\"plan-tf-title\">${tf.title}<\u002Fspan><\u002Fdiv>\n      <div class=\"plan-tf-body\">\n        <div class=\"plan-tf-img\">${img}<\u002Fdiv>\n        <div class=\"plan-tf-side\"><div class=\"plan-tf-note\">${tf.note}<\u002Fdiv><div class=\"plan-levels\">${levels}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join(\"\");\n  planEl.innerHTML = `\n    <div class=\"plan-head\">\n      <h2>Weekly Plan · ${wp.date} · ${wp.instrument}<\u002Fh2>\n      <div class=\"plan-bias\">${wp.bias}<\u002Fdiv>\n      <div class=\"plan-summary\">${wp.summary}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"plan-grid\">${cards}<\u002Fdiv>`;\n}\n\n/* Rendu des graphiques en dernier : tous les canvases (y c. Performance) existent désormais */\nbuildCharts();\n<\u002Fscript>\n<script>(function(){function k(){var e=document.getElementById(\"__bundler_err\");if(e)e.remove();}try{new MutationObserver(k).observe(document.documentElement,{childList:true,subtree:true});}catch(_){}document.addEventListener(\"DOMContentLoaded\",k);window.addEventListener(\"load\",k);setInterval(k,600);})();<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
