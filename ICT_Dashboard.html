<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diary of an ICT Trader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){try{var t=localStorage.getItem("ict-theme");if(!t)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();
</script>
<style>
:root{--bg:#f4f4f2;--card:#fcfcfb;--border:rgba(23,25,31,.1);--border2:rgba(23,25,31,.22);--text:#1a1c22;--muted:#6d7380;--accent-base:#4956d4;--accent:var(--accent-base);--accent-soft:color-mix(in srgb,var(--accent) 11%,transparent);--green:#0d8a60;--green-soft:rgba(13,138,96,.11);--red:#cf3a50;--red-soft:rgba(207,58,80,.1);--hover:rgba(23,25,31,.045);--mono:'IBM Plex Mono',monospace}
[data-theme="dark"]{--bg:#0f1013;--card:#16171c;--border:rgba(236,238,244,.09);--border2:rgba(236,238,244,.18);--text:#e9ebf0;--muted:#8a909c;--accent:color-mix(in oklab,var(--accent-base) 58%,#ffffff 42%);--green:#3cc389;--green-soft:rgba(60,195,137,.13);--red:#f2607a;--red-soft:rgba(242,96,122,.12);--hover:rgba(236,238,244,.055)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.55;transition:background-color .2s,color .2s;text-wrap:pretty}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
input,button,select{font:inherit;color:inherit}
button{cursor:pointer;appearance:none;background:none;border:none;color:inherit;text-align:inherit}
::selection{background:var(--accent-soft)}
.mono{font-family:var(--mono)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.right{text-align:right}
.wrap{max-width:1120px;margin:0 auto;padding:0 32px}
.rich{font-size:13px;line-height:1.7;color:var(--text)}
.rich p{margin:0 0 10px}
.rich p:last-child{margin-bottom:0}
.rich strong{font-weight:600}
.rich em{color:var(--muted)}
.rich img{max-width:100%;display:block;border:1px solid var(--border);border-radius:8px;margin:12px 0 0;cursor:zoom-in}
.rich h3{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
.rich ul,.rich ol{padding-left:18px}
.rich li{margin:4px 0}
.rich code{font-family:var(--mono);font-size:12px;background:var(--hover);padding:1px 5px;border-radius:4px}

/* ── Barre supérieure ── */
.topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.topbar-in{height:58px;display:flex;align-items:center;gap:24px}
.brand{display:flex;align-items:center;gap:10px;flex:0 0 auto}
.brand-name{font-size:14px;font-weight:600;letter-spacing:.01em;white-space:nowrap}
.tabs{display:flex;align-items:center;gap:2px;flex:1;min-width:0;overflow-x:auto;scrollbar-width:none}
.tab{border-bottom:2px solid transparent;color:var(--muted);font-size:13px;font-weight:500;padding:19px 12px 17px;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom-color:var(--accent)}
.top-right{display:flex;align-items:center;gap:12px;flex:0 0 auto}
.demo-badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:3px 8px;cursor:pointer}
.period{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.theme-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.theme-btn:hover{color:var(--text);border-color:var(--border2)}
.main{padding-top:44px;padding-bottom:90px}

/* ── Typo de section ── */
.lbl{font-family:var(--mono);font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.h1{font-size:21px;font-weight:600;letter-spacing:-.01em}
.h1-sub{font-size:13px;color:var(--muted);margin-top:6px;max-width:70ch;line-height:1.6}
.h2{font-size:14px;font-weight:600}
.small-muted{font-size:11px;color:var(--muted)}
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}

/* ── Aperçu ── */
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:44px;align-items:end}
.hero-pl{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:56px;font-weight:600;line-height:1.05;letter-spacing:-.02em;margin:10px 0 8px}
.hero-sub{font-size:12.5px;color:var(--muted)}
.target-wrap{margin-top:26px;max-width:420px}
.target-head{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:7px}
.bar{height:4px;border-radius:2px;background:var(--hover);overflow:hidden}
.bar>div{height:100%;border-radius:2px;transition:width .4s}
.eq-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:12px}
.eq-svg{display:block;width:100%;height:190px}
.eq-x{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px}
.eq-empty{height:222px;border:1px dashed var(--border2);border-radius:12px;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,var(--hover) 0 10px,transparent 10px 20px)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:40px}
.kpi{padding:18px 18px 16px 0}
.kpi-v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:21px;font-weight:600;margin-top:9px}
.kpi-s{font-size:11px;color:var(--muted);margin-top:3px}
.bars{display:flex;align-items:flex-end;gap:18px;padding:0 2px;overflow-x:auto}
.barcol{flex:0 1 76px;min-width:56px;display:flex;flex-direction:column;align-items:center;gap:7px}
.barval{font-family:var(--mono);font-size:11px;font-weight:600}
.barwrap{width:100%;height:82px;display:flex;align-items:flex-end}
.barfill{width:100%;min-height:3px;border-radius:3px 3px 0 0;opacity:.8}
.barlbl{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;border-top:1px solid var(--border);padding-top:6px;width:100%;text-align:center}

/* ── Filtres / cartes / tableaux ── */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:500;white-space:nowrap}
.chip:hover{color:var(--text);border-color:var(--border2)}
.chip.on{border-color:transparent;background:var(--accent-soft);color:var(--accent)}
.card{border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:hidden}
.tablewrap{overflow-x:auto}
.tgrid{display:grid;grid-template-columns:86px 58px minmax(160px,1fr) 96px 62px 96px 34px;gap:12px;min-width:660px}
.thead{padding:11px 18px 9px;font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.trow{padding:12px 18px;align-items:center;border-top:1px solid var(--border);cursor:pointer}
.trow:hover{background:var(--hover)}
.tsetup{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tdetail{padding:14px 18px 16px;border-top:1px dashed var(--border);background:var(--hover)}
.tmeta{display:flex;gap:22px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:10px}
.caret{color:var(--muted);font-size:9px;transition:transform .15s;display:inline-block}
.caret.open{transform:rotate(90deg)}
.dot{width:6px;height:6px;border-radius:50%;flex:0 0 auto;display:inline-block}
.stats-line{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:12px}
.empty{border:1px dashed var(--border2);border-radius:12px;padding:52px 24px;text-align:center}
.empty-title{font-size:13px;font-weight:500}
.empty-sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6}

/* ── Accordéons (sessions / backtests) ── */
.acc{border:1px solid var(--border);border-radius:12px;background:var(--card);margin-bottom:12px;overflow:hidden}
.acc-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;flex-wrap:wrap}
.acc-head:hover{background:var(--hover)}
.acc-body{padding:16px 18px 18px;border-top:1px solid var(--border)}
.tagpill{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 8px}

/* ── Préparation ── */
.panel{border:1px solid var(--border);border-radius:14px;background:var(--card);padding:22px 24px}
.badge-acc{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:3px 10px}
.tf-card{border:1px solid var(--border);border-radius:14px;background:var(--card);margin-top:14px;overflow:hidden}
.tf-head{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tf-tag{font-family:var(--mono);font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:5px;padding:2px 8px}
.tf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.tf-body{padding:16px 18px}
.imgbox{position:relative;min-height:210px;background:repeating-linear-gradient(45deg,var(--hover) 0 10px,transparent 10px 20px)}
.imgbox-note{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--muted);word-break:break-all}
.imgbox img{position:relative;display:block;width:100%;cursor:zoom-in}
.lvl{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-top:1px solid var(--border);font-size:12px}
.lesson{border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.6}
.lesson-lbl{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.btfig{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:0}
.btfig .imgbox{min-height:150px}
.btfig figcaption{font-size:11px;color:var(--muted);padding:8px 10px;border-top:1px solid var(--border);line-height:1.5}
.grid-230{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:14px}
.grid-260{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:14px}
.grid-320{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}

/* ── Playbook ── */
.rule-card{border:1px solid var(--border);border-radius:12px;background:var(--card);padding:16px 18px}
.rule-lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.rule-txt{font-size:12.5px;line-height:1.65}
.search{width:100%;background:none;border:none;border-bottom:1px solid var(--border2);padding:10px 2px;font-size:14px;color:var(--text);outline:none;border-radius:0}
.search:focus{border-bottom-color:var(--accent)}
.concept{padding:20px 0;border-bottom:1px solid var(--border)}
.quote-card{margin-top:52px;text-align:center;padding:28px 24px;border:1px solid var(--border);border-radius:14px;background:var(--card)}

/* ── Compte ── */
.pill{font-size:11px;font-weight:600;border-radius:999px;padding:3px 10px;white-space:nowrap}
.crow{display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px solid var(--border)}
.mm-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.mm-table{border:1px solid var(--border);border-radius:12px;background:var(--card);margin-top:18px;overflow-x:auto}
.mm-head{display:flex;gap:12px;padding:11px 18px 9px;min-width:520px}
.mm-row{display:flex;gap:12px;padding:9px 18px;border-top:1px solid var(--border);min-width:520px}
.hist-row{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}

/* ── Pied de page / lightbox ── */
.footer{max-width:1120px;margin:0 auto;padding:0 32px 44px;text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
#lightbox{position:fixed;inset:0;z-index:100;background:rgba(8,9,12,.9);display:none;align-items:center;justify-content:center;padding:32px;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
@media (max-width:720px){.wrap{padding-left:20px;padding-right:20px}.main{padding-top:32px}.hero-pl{font-size:42px}.footer{padding-left:20px;padding-right:20px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="lightbox" aria-hidden="true"><img id="lightbox-img" alt=""></div>
<script>
"use strict";

/* ═════════════════════ DONNÉES (source unique de vérité) ═════════════════════
   Même schéma que la V1 — le pipeline (tools/update_dashboard.py) réécrit ce
   fichier en place : marqueurs <EQUITY> / <INTRADAY> / <TRADES> + meta.fills,
   periodEnd et bestTrade. Tout le reste s'édite à la main ici. */
const DATA = {
  meta: {
    periodStart: "18 juillet 2026",
    periodEnd: "18 juillet 2026",
    account: "Topstep — Combine 50K",
    fills: 0,                          // journal remis à zéro le 18 juillet — repeuplé par tools/update_dashboard.py
    riskMaxDay: { value: 0, label: "Risque max engagé", sub: "—" },
    maxDrawdownLimit: -2000,          // MLL trailing Topstep 50K (jauge prop firm) — éditable à la main
    // Comptes prop firm — ajouter un compte ou une firme = une ligne ici.
    // ddModel : "trailing-eod" | "trailing-intraday" | "static". Une règle à null = carte désactivée.
    // Seuils vérifiés sur le rulebook Topstep du 17 juin 2026 (cf. topstep_rules_reference.md).
    //   • dailyLossLimit = DLL OPTIONNELLE du Combine (choisie à l'achat). dllOptional:true ⇒ informatif,
    //     pas un blow-up ; sert aussi de base au stop perso. Passe dllOptional:false si tu l'achètes.
    //   • winDayThreshold/minWinDays = critère de PAYOUT du compte financé (5 jours ≥ $150 net),
    //     PAS une condition pour passer le Combine (qui = objectif + consistance + minDaysToPass).
    //   • minDaysToPass = plancher Topstep : impossible de valider en moins de 2 jours.
    propFirms: [
      { id: "ts50",  firm: "Topstep", plan: "Combine 50K",  ddModel: "trailing-eod",
        accountSize: 50000,  profitTarget: 3000, mll: 2000, dailyLossLimit: 1000, dllOptional: true,
        consistencyPct: 50, minWinDays: 5, winDayThreshold: 150, maxContracts: 5,  minDaysToPass: 2, flatByCT: "15:10" },
      { id: "ts100", firm: "Topstep", plan: "Combine 100K", ddModel: "trailing-eod",
        accountSize: 100000, profitTarget: 6000, mll: 3000, dailyLossLimit: 2000, dllOptional: true,
        consistencyPct: 50, minWinDays: 5, winDayThreshold: 150, maxContracts: 10, minDaysToPass: 2, flatByCT: "15:10" },
      { id: "ts150", firm: "Topstep", plan: "Combine 150K", ddModel: "trailing-eod",
        accountSize: 150000, profitTarget: 9000, mll: 4500, dailyLossLimit: 3000, dllOptional: true,
        consistencyPct: 50, minWinDays: 5, winDayThreshold: 150, maxContracts: 15, minDaysToPass: 2, flatByCT: "15:10" },
      // SwissFirmUp (vérifié 2026-06-24, swissfirmup.com/reglements) : qualification 2 étapes, futures, split 90 %.
      // Drawdown EOD qui traile sur le SOLDE DE CLÔTURE (pas l'intraday) → modèle trailing-eod, plus fidèle ici que pour Topstep.
      // Aucune Daily Loss Limit (dailyLossLimit: null). Consistance 50 % de l'OBJECTIF initial (consistencyBasis "target", pas le profit total).
      // Aucun minimum de jours (minDaysToPass: 1), qualif. plafonnée à 30 jours.
      // Flat avant 17:00 ET = clôture CME des indices (= 16:00 CT ; pause maintenance 17:00–18:00 ET) — pas d'overnight. flatTz "ET" car Benjamin raisonne en heure de New York.
      { id: "sf50",  firm: "SwissFirmUp", plan: "Qualification 50K",  ddModel: "trailing-eod",
        accountSize: 50000,  profitTarget: 3000, mll: 2000, dailyLossLimit: null,
        consistencyPct: 50, consistencyBasis: "target", minWinDays: null, winDayThreshold: 150, maxContracts: 10, minDaysToPass: 1, flatByCT: "17:00", flatTz: "ET" },
      { id: "sf100", firm: "SwissFirmUp", plan: "Qualification 100K", ddModel: "trailing-eod",
        accountSize: 100000, profitTarget: 5000, mll: 2500, dailyLossLimit: null,
        consistencyPct: 50, consistencyBasis: "target", minWinDays: null, winDayThreshold: 200, maxContracts: 15, minDaysToPass: 1, flatByCT: "17:00", flatTz: "ET" },
      { id: "sf200", firm: "SwissFirmUp", plan: "Qualification 200K", ddModel: "trailing-eod",
        accountSize: 200000, profitTarget: 7000, mll: 3000, dailyLossLimit: null,
        consistencyPct: 50, consistencyBasis: "target", minWinDays: null, winDayThreshold: 250, maxContracts: 20, minDaysToPass: 1, flatByCT: "17:00", flatTz: "ET" },
      { id: "sf300", firm: "SwissFirmUp", plan: "Qualification 300K", ddModel: "trailing-eod",
        accountSize: 300000, profitTarget: 9000, mll: 3500, dailyLossLimit: null,
        consistencyPct: 50, consistencyBasis: "target", minWinDays: null, winDayThreshold: 300, maxContracts: 30, minDaysToPass: 1, flatByCT: "17:00", flatTz: "ET" }
    ],
    // Tentatives de challenge — historique versionné. Ordre CHRONOLOGIQUE.
    //   • propFirmId → entrée de propFirms (seuils/MLL/objectif). startDate/endDate = labels de jour (comme trades[].date).
    //   • status: "passed" | "failed" | "active" (≤ 1 active). La tentative active n'a pas d'endDate (= null) et prend
    //     tous les trades après la dernière fermée → les futurs trades s'y rattachent automatiquement.
    //   • Pour clôturer : passe status à "passed"/"failed", fixe endDate, et ajoute la tentative suivante en "active".
    challenges: [
      { id: "c1", propFirmId: "ts50", firm: "Topstep", plan: "Combine 50K",
        startDate: "17 juin", endDate: "24 juin", status: "passed",
        note: "Combine validée le 24 juin : objectif $3 000 atteint (cum $3 089), consistance OK." },
      { id: "c2", propFirmId: "sf300", firm: "SwissFirmUp", plan: "Qualification 300K",
        startDate: "25 juin", endDate: "18 juillet", status: "failed",
        note: "Ouvert après la Combine TopStep réussie · sizing 7 micros MNQU (5+2). Clôturé « failed » le 18 juillet lors de la remise à zéro du journal — historique archivé (tag journal-v1-pre-reset · archive/2026-07-pre-reset/)." }
    ],
    // Money management — profil CONSERVATEUR. Tout est dérivé de propFirms ci-dessus : aucun seuil en dur.
    mm: {
      profile: "Conservateur",
      dailyStopPctOfDLL: 0.40,     // stop perso = 40 % du Daily Loss Limit Topstep…
      minBufferDays: 5,            // …et jamais plus que MLL ÷ 5 (≥ 5 journées rouges de marge avant blow-up)
      riskTradesPerDay: 2,         // risque/trade = stop quotidien ÷ 2 (≤ 2 trades perdants par jour)
      dailyGainPctOfTarget: 0.40,  // plafond de gain/jour = 40 % de l'objectif (marge sous la règle de consistance 50 %)
      stopGrid: [5, 8, 10, 12, 15, 20, 25, 30],   // distances de stop (points) listées dans la table de référence
      instruments: [
        { sym: "NQ",  label: "NQ — mini",   perPt: 20, micro: false },
        { sym: "MNQ", label: "MNQ — micro", perPt: 2,  micro: true  },
        { sym: "ES",  label: "ES — mini",   perPt: 50, micro: false },
        { sym: "MES", label: "MES — micro", perPt: 5,  micro: true  }
      ]
    }
  },

  /* P/L cumulé RÉEL — généré depuis TradeActivityLogExport par tools/update_dashboard.py */
  equity: [
    // <EQUITY>

    // </EQUITY>
  ],

  /* P/L cumulé RÉALISÉ intraday (échantillonné au fill) — généré par tools/update_dashboard.py.
     Vide ⇒ le dashboard reconstruit la courbe au trade depuis trades[] (fallback). */
  intraday: [
    // <INTRADAY>

    // </INTRADAY>
  ],

  /* Trades RÉELS (cycles flat→flat) — généré depuis TradeActivityLogExport · annotations ICT via tools/annotations.json */
  trades: [
    // <TRADES>

    // </TRADES>
  ],

  bestTrade: { value: "—", sub: "—" },

  sessions: [],
  rules: [
    { label: "Principe fondamental", text: "Un trader ICT ne réagit pas au prix — il anticipe le prix." },
    { label: "Déterminer le range D'ABORD", critical: true, text: "1ère chose à faire avant toute exécution : déterminer le range dans lequel on va travailler. Trouver le time frame où le range est le plus CLAIR, puis descendre vers le time frame d'exécution en respectant l'alignement avec ce range. Pas de range défini = pas de trade." },
    { label: "No revenge trading", critical: true, text: "Sizing fixe : 4 micros MNQ = $200 de risque par trade, toujours. Un stop loss ne justifie jamais d'augmenter la position suivante. Le résultat ne valide pas le process." },
    { label: "Risk Management éval Topstep (fixe)", critical: true, text: "Plan de risque FIXE, en permanence : 4 micros MNQ = $200 de risque/trade · TP à 2:1 (+$400) · perte max $400/jour = 2 trades, puis stop pour la journée. Afficher le mini (NQU26) pour les vrais volumes, exécuter le micro (MNQU26). Conforme Topstep 50K : bien sous la DLL ($1,000) et le drawdown trailing ($2,000), meilleur jour largement < $1,500 (consistance). 4 micros × $2/pt = $8/pt → stop ~25 pts, TP ~50 pts. RÈGLE D'OR : ne JAMAIS déplacer le SL ni le TP une fois posés — la régularité d'un TP/SL fixe est ce qui fait passer l'éval et tenir le compte (le TP mobile piège dans les ranges)." },
    { label: "Invalidation OB", text: "Bougie CLOSE en dessous de 50% de l'OB → trade invalidé. Jamais sur la mèche." },
    { label: "Premium / Discount (PDA)", text: "Dans un PDA : en dessous du 50% = Premium · au-dessus = Discount. Logique inversée vs range." },
    { label: "Gestion des partiels", text: "Partiel → SL immédiat à BE. Stop dynamique : sous lower high, niveau OB, ou displacement." },
    { label: "News (8:30 ET)", text: "Entrée sur limit order uniquement — spike trop rapide pour confirmation LTF." },
    { label: "SMT Panel NQ", text: "YM / ES / NQ (tradés) · NVDA (primaire, non tradé) · AAPL (secondaire, non tradé)." },
    { label: "Contrat dominant", text: "Toujours trader le contrat avec le plus de volume. Roll NQM26 → NQU26 vers le 17–18 juin." },
    { label: "Framework range", text: "0% SSL · 25% best buys · 50% EQL · 75% best sells · 100% BSL." },
    { label: "Modèle Unicorn (ICT)", text: "Displacement → FVG créé → prix revient dans le FVG → Breaker Block à l'intérieur ou adjacent. Confluence FVG + Breaker = setup à exécuter sans hésitation." },
    { label: "Hiérarchie des PDAs · Zone Discount", text: "Priorité 1 : GAP (premier PDA, bottom) · Priorité 2 : FVG/Unicorn · Priorité 3 : OB. Poser un ordre limite à chaque niveau dès la planification pré-marché." },
    { label: "Volume Imbalance · Effet aimant", text: "Tant qu'un corps de bougie ne traverse pas le Volume Imbalance, il agit comme un aimant. Seul un corps (jamais une mèche) qui le traverse en entier le neutralise." },
    { label: "Macro ICT · Fenêtre algorithmique", text: "Toutes les heures, entre :50 et :10 (ex : 7:50–8:10, 9:50–10:10…), l'algorithme prend de la liquidité ou atteint une efficience (FVG, SSL/BSL). Run-Stop-Run = pattern typique. Instrument préféré : ES (plus propre que NQ)." },
    { label: "Kill Zones · Haute probabilité", text: "London KZ : 2h–5h ET · NY AM : 8h30–11h ET · London Close : 10h–12h ET. Un retour dans un FVG pendant une Kill Zone est une confluence ICT forte — l'algorithme agit à heures précises, pas au hasard." },
    { label: "TP sur liquidité · marge 1–2 ticks", critical: true, text: "Quand le TP vise une BuySide Liquidity (BSL) : placer l'ordre limite 1–2 ticks SOUS le niveau pour garantir le fill — le prix peut toucher la liquidité une seule fois sans remplir l'ordre (cas vécu 15 juin : niveau effleuré mais position non fermée). Symétrique pour une SellSide Liquidity (SSL) : placer l'ordre limite 1–2 ticks AU-DESSUS du niveau." },
    { label: "Ne pas flipper le biais", critical: true, text: "Quand j'ai une conviction directionnelle forte (ex. 17 juin : convaincu que ça monte), NE PAS prendre de trades CONTRE cette conviction. Flipper le biais en cours de session = se retrouver à shorter un marché qu'on croit haussier → stops à répétition. Une conviction = une direction : si stoppé dans le sens du biais, ré-évaluer ou attendre une meilleure entrée DANS le sens du biais — jamais inverser." },
    { label: "Buffer de stop au-delà du sweep", critical: true, text: "Quand le stop est placé derrière une liquidité prise (sweep SSL/BSL), lui donner 2–3 ticks de marge AU-DELÀ de l'extrême de la mèche — jamais pile sur le niveau. Une dernière mèche vient souvent chercher le tick exact avant le vrai mouvement (cas 17 juin T1 : bon trade, sorti au tick près, puis le prix repart). Stop structurel ≠ stop collé au niveau du sweep." },
    { label: "Le 5 min exécute, le 1H autorise", critical: true, text: "Hiérarchie des timeframes (modèle Trinity 1H + 5 min) : le biais se décide en 1H, l'entrée s'exécute en 5 min. Une cassure 5 min CONTRE le biais 1H = une prise de liquidité, PAS un retournement — c'est souvent l'opportunité d'entrer dans le sens du biais après le sweep. On ne reverse le biais QUE si le 1H casse à son tour. Tant que la structure 1H tient, ignorer le bruit 5 min contraire et rester dans la direction autorisée par le 1H. Corollaire direct de « Ne pas flipper le biais »." },
    { label: "Pas d'ordre limite le week-end", critical: true, text: "Ne JAMAIS laisser un ordre limite ouvert pendant le week-end. Le gap et le repricing du dimanche soir / lundi peuvent emmener le prix bien au-delà du plan : le 22 juin, le marché a retracé jusqu'à ≈ 30,470 — sous la limite prévue (30,603) ET sous le SL structurel (30,537.75). Une limite week-end aurait été remplie puis stoppée pour une perte pleine, alors même que le biais Long restait juste. Leçon : préparer le plan le week-end, mais n'exécuter qu'en séance, après confirmation 5 min en Kill Zone. Le plan autorise, la séance confirme." },
    { label: "Cette semaine : cadre 1H, exécution 5 min — PAS de 1 min", critical: true, text: "Discipline de la semaine (22 juin →) : le cadre se lit en 1H, l'exécution se fait en 5 min. NE PAS regarder le 1 min. Le 1 min a induit l'erreur du 22 juin (short d'instinct sur le high de l'Asia = piège de bruit, −$55). Le 1 min crée des micro-signaux contre le biais qui poussent à flipper. En restant sur le 5 min, le bruit disparaît et seules les vraies structures alignées avec le 1H déclenchent une entrée. Deux timeframes, pas trois." },
    { label: "Protéger le gain du runner sur cassure de structure", critical: true, text: "Le runner (1 micro) se gère en DISCRÉTIONNAIRE — distinct des 4 contrats fixes qui restent sur le bracket dur (SL/TP jamais déplacés). Principe : ne pas laisser un runner déjà bien en profit revenir au break-even. Si une structure baissière se forme CONTRE le long alors qu'on est nettement en gain (22 juin : runner à ≈ +$275, « plus de $200 »), on sort et on encaisse. Le BE auto est un PLANCHER de protection, pas une cible. Validé le 22 juin : après la sortie sous le PDH, le prix a cassé la structure et chuté jusqu'à ≈ 30,450 — bien sous le BE 30,643.50. Tenir jusqu'au BE aurait rendu tout le gain du runner." },
    { label: "TP à temps — ne pas s'éterniser dans un trade", critical: false, text: "La cible peut mettre des heures à se réaliser : le 22 juin, le PDH n'a été pris qu'à ~14h alors que le trade aurait couru depuis ~9h30 (≈ 4h+ d'attente passive). Rester aussi longtemps = exposition au retournement + charge mentale, pour un gain souvent déjà acquis plus tôt. Préférer encaisser sur cassure de structure / cible intermédiaire atteinte plutôt qu'attendre passivement le TP final. Complète la gestion discrétionnaire du runner : on prend le profit à temps." },
    { label: "Money management SwissFirmUp 300K (7 micros)", critical: true, text: "Nouveau compte SwissFirmUp 300K (à partir du 25 juin) → sizing porté à 7 micros MNQU (+2 vs les 5 de Topstep). BRACKET : 6 micros fixes au TP1 (2:1, +50 pts = +$600) + 1 runner. SL 25 pts = 7 × 25 × $2 = −$350 de risque par trade. RM FIXE : SL et TP jamais déplacés une fois posés (seule exception : gestion discrétionnaire du runner sur cassure de structure). Objectif $9 000, MLL $3 500 (trailing EOD, verrouille au solde de départ). Le reste de la discipline ne change pas : suivre le biais de l'algo, stop après 2 SL, pas de 1 min." }
  ],

  /* ---- Concepts ICT (glossaire vivant) ---- */
  concepts: [
    { label: "Sick Sister (sœur malade)", text: "Quand l'un des trois indices corrélés (YM / ES / NQ) manque de force ou d'énergie face au leader du mouvement : il ne parvient pas à suivre la tendance immédiate. Avec le temps, l'indice « malade » reprend des forces et se déplace en sympathie avec les deux autres — il est alors « tiré » par le plus fort. Lecture pratique : repérer l'indice à la traîne → anticiper son rattrapage en sympathie avec le leader (lié à la lecture SMT)." },
    { label: "Macro (fenêtre :50–:10)", text: "Séquence temporelle courte et prédéterminée durant laquelle l'algorithme de marché active un mode de livraison spécifique. Les macros se produisent à chaque heure, environ entre :50 et :10 (ex. 7:50–8:10, 9:50–10:10…). Rôle opérationnel : initier un mouvement directionnel qui va chercher la liquidité au-delà des zones de protection établies lors de la session précédente. Exemple — la « lunch macro » (~11:50–12:10 ET) manipule les stops des traders profitables du matin pour offrir de la liquidité avant de poursuivre ou corriger la tendance. À retenir : ce n'est pas aléatoire mais un comportement algorithmique programmé sur le temps → permet d'anticiper renversements et accélérations avec précision." },
    { label: "New Week Opening Gap (NWOG)", text: "Définition : l'espace entre le prix de clôture du vendredi et le prix d'ouverture du dimanche soir. ICT maintient cette zone ombrée sur les graphiques pour identifier un niveau de liquidité et de juste valeur (fair value). Utilité comme filtre : sert de cadre pour définir un biais directionnel — en règle générale, chercher à acheter en dessous de l'ouverture du dimanche, et à vendre au-dessus. Application : valable en intraday comme sur plusieurs jours/semaines ; ce n'est pas une règle rigide interdisant le trade opposé mais un filtre pour repérer les opportunités les plus qualitatives. Juste valeur : zone de fair value prolongée — en marché haussier, le prix tend à respecter ces niveaux comme support après les avoir traversés ou lors des corrections. En résumé : un aimant / point d'appui algorithmique pour éviter le bruit et se concentrer sur les zones où la réaction institutionnelle est la plus probable." },
    { label: "Narratif (narrative)", text: "Comprendre trois éléments fondamentaux pour anticiper le comportement du marché : (1) ce que l'algorithme va faire ensuite dans le prix, (2) pourquoi il doit le faire, (3) quand il doit le faire." },
    { label: "Kill Zone New York", text: "Cœur de la Kill Zone de New York : 7:00–9:00 (ET). Elle peut s'étendre d'une heure avant et d'une heure après, soit une fenêtre élargie de 6:00 à 11:00 (ET)." },
    { label: "Turtle Soup", text: "Façon plus agile de trader les larges plages de consolidation (ranges) sans viser les extrêmes absolus. On utilise les niveaux 75–80% du range pour les ventes / cibles hautes, et les niveaux autour de 20% pour la partie basse. L'idée : se concentrer sur les swing highs et swing lows À L'INTÉRIEUR de ces zones pour former des configurations Turtle Soup (capture de liquidité) — sans avoir besoin que le prix sorte de la zone globale de consolidation." },
    { label: "High Resistance Liquidity Run (HRLR)", text: "Run de liquidité en environnement de FORTE résistance : le prix chasse la liquidité à travers une zone encombrée / choppy (consolidation, allers-retours, OB et FVG opposés). C'est une condition à ÉVITER de trader — le chemin n'est pas dégagé, le risque de se faire sortir avant le TP est élevé. À l'opposé, privilégier les Low Resistance Liquidity Runs (LRLR) où le trajet vers la liquidité est propre. Règle perso : si le setup n'est pas assez clair (HRLR), attendre — ne jamais forcer l'entrée." },
    { label: "Judas Swing", text: "Faux mouvement destiné à INDUIRE les traders de breakout. L'algorithme casse un niveau évident (ex. le low de l'Asie) pour piéger les vendeurs de cassure et prendre leur liquidité (SSL), avant de repartir dans l'AUTRE sens. Mesure : du TDO (True Day Open) jusqu'à la fin du mouvement (l'extrême du Judas Swing), puis retournement. La « boîte rouge » sur le chart = le Judas Swing tel que l'enseigne ICT. S'applique aux sessions ET aux ouvertures (open). Lecture pratique : ne pas suivre la cassure — attendre le retournement après la prise de liquidité, surtout en confluence SSL + SMT." },
    { label: "Trinity (algo maison · lecture de prix ICT)", text: "Indicateur de lecture de marché développé maison, construit autour des concepts ICT et volontairement dépouillé pour rendre le prix lisible d'un coup d'œil. Il répond à trois questions, et seulement trois. (1) OÙ est le prix ? Le HZONE projette le dealing range des 20 derniers jours (ancré au Daily) en quartiles 0 / 25 / 50 / 75 / 100, avec la ligne d'équilibre à 50 % : au-dessus = premium (on cherche à vendre), en dessous = discount (on cherche à acheter). (2) QUE fait le prix ? Un ZigZag incrémental, filtré par l'ATR, marque les pivots de structure par de simples points — sans label ni interprétation imposée, pour qu'on lise le mouvement réel, pas une étiquette. (3) VERS QUOI va le prix ? Les niveaux de liquidité objectifs — PDH/PDL (veille) et PWH/PWL (semaine passée) — en pointillés, montrent où dort la liquidité que le prix vient chercher. Une couche T3 (Tillson) optionnelle ajoute une confirmation de momentum. Palette charcoal unifiée, aucun signal d'achat/vente : Trinity ne décide rien à ta place, il rend visibles les faits de prix. Timeframes de travail : 1H + 5 min." },
    { label: "Premium / Discount par les ordres (quartiles fib 0/25/50/75/100)", text: "La lecture la plus parlante du premium/discount : elle l'explique par les ORDRES qui dorment dans le carnet, pas par une zone colorée. En partant du MARKET PRICE (= 50 %, l'équilibre) — juste au-dessus : des SELLERS (limites de vente = résistance immédiate) ; tout en haut : des BUYERS = des buy stops = la liquidité acheteuse (BSL). Juste en dessous : des BUYERS (limites d'achat = support immédiat) ; tout en bas : des SELLERS = des sell stops = la liquidité vendeuse (SSL). Mapping sur le FIB : <strong>100 % = BSL</strong> (buy stops du haut) → cible haute, le smart money VEND ici (deep premium) · <strong>75 % = premium</strong>, zone de vente optimale (best sells) · <strong>50 % = équilibre</strong> (market price), no man's land · <strong>25 % = discount</strong>, zone d'achat optimale (best buys) · <strong>0 % = SSL</strong> (sell stops du bas) → cible basse, le smart money ACHÈTE ici (deep discount). Logique clé : on VEND en premium parce qu'on vend aux buy stops du dessus, on ACHÈTE en discount parce qu'on achète aux sell stops du dessous. Le prix va toujours chercher la liquidité qui dort aux extrêmes (0 et 100). Piège classique (cf. T1 du 22 juin) : acheter juste après un sweep du high — proche du 100 / premium — c'est acheter là où le smart money vend. <img src='plans/2026-06-22/04-premium-discount-orderflow.png' alt='Premium / Discount par les ordres' style='display:block;width:100%;max-width:340px;margin:14px 0 0;border:1px solid var(--border);border-radius:8px;cursor:zoom-in' onclick='document.getElementById(&quot;bt-lightbox-img&quot;).src=this.src;document.getElementById(&quot;bt-lightbox&quot;).classList.add(&quot;open&quot;)'>" },
    { label: "IFVG · Inverse Fair Value Gap", text: "Un FVG « inversé ». Quand un FVG est traversé et qu'une bougie CLÔTURE de l'autre côté (le corps, pas la mèche), il change de rôle : un FVG baissier cassé à la hausse (clôture au-dessus) devient un IFVG haussier = SUPPORT ; un FVG haussier cassé à la baisse devient un IFVG baissier = résistance. Séquence d'usage (cas 22 juin, long) : (1) VALIDATION — une bougie ferme au-dessus de l'IFVG ; (2) RETEST — le prix revient tester la zone par le haut ; (3) CONTINUATION — si l'IFVG tient, le prix repart plus haut. INVALIDATION : si une bougie ferme sur le BAS de l'IFVG (repasse au travers en clôture), le signal est annulé. Forte confluence avec une entrée OTE/discount et un draw de liquidité au-dessus (PDH/BSL)." },
    { label: "Volume Imbalance (VI)", text: "Déséquilibre de volume : un écart entre le CORPS de clôture d'une bougie et l'OUVERTURE de la suivante, alors que les mèches se chevauchent (le prix touche la zone mais aucun corps ne s'y forme). Différence avec le FVG : le FVG est un vrai gap de prix sur 3 bougies (les mèches ne se chevauchent pas) ; le VI est plus fin, un trou entre corps là où le prix est passé trop vite. Rôle : zone de déséquilibre que le prix tend à revenir « combler » / rééquilibrer — agit comme aimant et zone de réaction (support/résistance selon le sens). Sur les hautes UT (ex. Weekly), un VI devient un niveau de référence majeur : on attend que le prix l'atteigne avant d'agir (cas 23 juin : VI Weekly ≈ 30,000–30,200, aucune action tant que le prix n'y est pas)." },
    { label: "CISD · Change in State of Delivery", text: "Changement d'état de livraison : le moment précis où le prix bascule d'une livraison baissière à haussière (ou l'inverse). Bullish CISD : après une jambe vendeuse, une bougie CLÔTURE au-dessus de l'ouverture de la série de bougies baissières qui a créé la dernière jambe — signe que les acheteurs reprennent la livraison. C'est un déclencheur d'entrée fin (souvent en 1 min / 5 min), à utiliser DANS une zone de confluence (FVG, VI, OB) et en confluence avec un MSS (market structure shift). Différence avec le MSS : le MSS = cassure d'un swing de structure ; le CISD = cassure de l'ouverture du dernier bloc de livraison opposé (plus précis, plus tôt). Cas 23 juin : CISD ≈ 30,138 + MSS ≈ 30,170 dans les FVG du VI weekly → déclencheur du Long." },
    { label: "Structure du marché (STH/STL · ITH/ITL · LTH/LTL)", text: "Le concept de structure de marché ICT — la hiérarchie des swings. <br><br>• <strong>Hiérarchie parent/enfant</strong> : le Daily est le parent ; les UT inférieures lui sont subordonnées.<br><br>• <strong>3 degrés de swings</strong> : STH/STL (court terme), ITH/ITL (moyen terme, entre deux swings court terme), LTH/LTL (encadré par un niveau HTF).<br><br>• <strong>La règle clé</strong> : tout rééquilibrage d'un ancien FVG crée un point moyen terme — FVG haussier comblé → ITL, FVG baissier comblé → ITH (étiqueté mentalement, pas sur le chart).<br><br>• <strong>Le LTH comme filtre</strong> : tant que le prix reste sous le LTH, le biais tient ; s'il casse, l'analyse HTF est fausse → stop = gestion du risque, pas un échec.<br><br>• <strong>Le faux bull flag</strong> : la consolidation que le retail prend pour un drapeau haussier, ICT la fade (distribution).<br><br><img src='plans/concepts/market-structure-ict.png' alt='Structure de marché ICT · STH/STL · ITH/ITL · LTH/LTL' style='display:block;width:100%;max-width:560px;margin:14px 0 0;border:1px solid var(--border);border-radius:8px;cursor:zoom-in' onclick='document.getElementById(&quot;bt-lightbox-img&quot;).src=this.src;document.getElementById(&quot;bt-lightbox&quot;).classList.add(&quot;open&quot;)'>" },
    { label: "Triangle de lecture Trinity (3 questions + règles algo)", text: "La grille de lecture Trinity — les 3 questions à se poser + les règles de l'algo.<br><br>• <strong>Le triangle de lecture</strong> (de haut en bas) : OÙ suis-je dans le range (premium/discount) → QUE fait la structure (structure/pivots) → VERS QUELLE liquidité (le draw).<br><br>• <strong>Couleur du cloud</strong> = le biais structurel. Elle bascule quand le prix CLÔTURE au-delà du dernier swing (cassure de structure). À qualifier par le contexte : une cassure n'est pas une tendance, ça peut être un sweep.<br><br>• <strong>Cassure 5m contre le 1H</strong> = prise de liquidité, PAS retournement. On ne reverse le biais que si le 1H casse à son tour. Le 5m exécute ; le 1H autorise.<br><br>• <strong>Désaccord Daily / 1H</strong> : Daily et 1H d'accord → trade plein (continuation). Daily et 1H en désaccord → trade dégradé (counter-trend) : plus petit, plus court, on ne vise que la liquidité proche. Le 1H autorise l'entrée, le Daily fixe l'ambition et l'horizon.<br><br> <img src='plans/concepts/Trinity.png' alt='Triangle de lecture Trinity · 3 questions + règles algo' style='display:block;width:100%;max-width:480px;margin:14px 0 0;border:1px solid var(--border);border-radius:8px;cursor:zoom-in' onclick='document.getElementById(&quot;bt-lightbox-img&quot;).src=this.src;document.getElementById(&quot;bt-lightbox&quot;).classList.add(&quot;open&quot;)'>" }

/* ── helpers ── */
const esc = s => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
const fmt = n => (n < 0 ? "−$" : "+$") + Math.abs(Math.round(n)).toLocaleString("en-US");
const fmtAbs = n => "$" + Math.abs(Math.round(n)).toLocaleString("en-US");

function plOf(t) {
  if (typeof t.plNum === "number") return t.plNum;
  if (!t.pl || t.pl === "—") return null;
  const str = String(t.pl).replace(/[^\d.]/g, "");
  if (!str) return null;
  return (t.plClass === "neg" || /[−-]/.test(t.pl)) ? -parseFloat(str) : parseFloat(str);
}
function frTime(s) {
  const M = { janvier: 0, "février": 1, mars: 2, avril: 3, mai: 4, juin: 5, juillet: 6, "août": 7, septembre: 8, octobre: 9, novembre: 10, "décembre": 11 };
  const m = String(s || "").match(/(\d{1,2})\s+([a-zà-ÿ]+)(?:\s+(\d{4}))?/i);
  if (!m) return 0;
  return new Date(m[3] ? +m[3] : 2026, M[m[2].toLowerCase()] ?? 0, +m[1]).getTime();
}
/* HTML « riche » authored dans DATA : on neutralise les onclick hérités de la V1
   (le lightbox est géré par délégation) et on masque les images introuvables. */
function rich(str) {
  const s = String(str || "")
    .replace(/onclick='[^']*'/gi, "").replace(/onclick="[^"]*"/gi, "")
    .replace(/<img /gi, "<img onerror=\"this.style.display='none'\" ");
  return '<div class="rich">' + s + '</div>';
}

function compute() {
  const GREEN = "var(--green)", RED = "var(--red)", ACC = "var(--accent)", MUT = "var(--muted)", TXT = "var(--text)";
  const dash = "—";

    demoUsed = true;
  }
  const active = challenges.find(c => c.status === "active") || null;
  const propFirms = meta.propFirms || [];
  const activePf = active ? propFirms.find(p => p.id === active.propFirmId) : null;

  /* stats de base */
  const pls = trades.map(plOf).filter(v => v !== null);
  const cum = equity.length ? equity[equity.length - 1].cum : pls.reduce((a, b) => a + b, 0);
  const winPLs = pls.filter(v => v > 0), lossPLs = pls.filter(v => v < 0);
  const wins = winPLs.length, losses = lossPLs.length, closed = wins + losses;
  const wr = closed ? Math.round(100 * wins / closed) : 0;
  const totWins = winPLs.reduce((a, b) => a + b, 0), totLoss = Math.abs(lossPLs.reduce((a, b) => a + b, 0));
  const avgWin = wins ? totWins / wins : 0, avgLoss = losses ? totLoss / losses : 0;
  const oneR = avgLoss || 1;
  const payoff = avgLoss ? avgWin / avgLoss : 0;
  const expectancy = closed ? (wins / closed) * avgWin - (losses / closed) * avgLoss : 0;
  const rExp = expectancy / oneR;
  const pf = totLoss > 0 ? totWins / totLoss : (totWins > 0 ? 99 : 0);
  let run = 0, peakT = 0, maxDD = 0;
  trades.forEach(t => { const v = plOf(t); if (v === null) return; run += v; peakT = Math.max(peakT, run); maxDD = Math.max(maxDD, peakT - run); });
  /* discipline : violations du pipeline (V2) OU processClean (V1/démo) */
  const cleanOf = t => Array.isArray(t.violations) ? t.violations.length === 0
    : (typeof t.processClean === "boolean" ? t.processClean : null);
  const annot = trades.filter(t => cleanOf(t) !== null);
  const cleanN = annot.filter(t => cleanOf(t)).length;
  const adher = annot.length ? Math.round(100 * cleanN / annot.length) : null;
  const hasTrades = closed > 0;

  const periodLabel = active
    ? (active.startDate || "—") + " → " + (active.endDate || "en cours")
    : (meta.periodStart ? meta.periodStart + " → " + (meta.periodEnd || "—") : "");

  /* hero */
  const heroLabel = "P&L net" + (active ? " · " + active.firm + " " + active.plan : (meta.account ? " · " + meta.account : ""));
  const heroPl = hasTrades ? fmt(cum) : "$0";
  const heroColor = hasTrades ? (cum >= 0 ? GREEN : RED) : MUT;
  const heroSub = hasTrades
    ? periodLabel + " · " + closed + " trades · " + wins + "W / " + losses + "L"
    : "Journal remis à zéro le 18 juillet — en attente des premiers trades de la nouvelle tentative.";
  const target = activePf && activePf.profitTarget ? activePf.profitTarget : 0;
  const targetPct = target ? Math.max(0, Math.min(100, Math.round(100 * cum / target))) : 0;
  const targetColor = targetPct >= 100 ? GREEN : ACC;

  /* courbe equity (SVG) */
  const eqp = equity.length ? equity : [{ date: "—", cum: 0 }];
  const cums = eqp.map(p => p.cum);
  const lo = Math.min(0, ...cums), hi = Math.max(0, ...cums), span = (hi - lo) || 1;
  const W = 560, H = 190, pad = 6;
  const X = i => eqp.length > 1 ? pad + i * (W - 2 * pad) / (eqp.length - 1) : W / 2;
  const Y = v => pad + (1 - (v - lo) / span) * (H - 2 * pad);
  const eqPts = eqp.map((p, i) => X(i).toFixed(1) + "," + Y(p.cum).toFixed(1)).join(" ");
  const baseY = Y(0);
  const eqArea = X(0).toFixed(1) + "," + baseY.toFixed(1) + " " + eqPts + " " + X(eqp.length - 1).toFixed(1) + "," + baseY.toFixed(1);
  let gridSvg = [0.25, 0.5, 0.75].map(f => {
    const y = (pad + f * (H - 2 * pad)).toFixed(1);
    return '<line x1="0" x2="560" y1="' + y + '" y2="' + y + '" stroke="var(--border)" stroke-width="1" vector-effect="non-scaling-stroke"></line>';
  }).join("");
  gridSvg += '<line x1="0" x2="560" y1="' + baseY.toFixed(1) + '" y2="' + baseY.toFixed(1) + '" stroke="var(--border2)" stroke-width="1" stroke-dasharray="5 5" vector-effect="non-scaling-stroke"></line>';
  const up = cum >= 0;

  /* barres quotidiennes */
  const deltas = eqp.map((p, i) => i === 0 ? p.cum : p.cum - eqp[i - 1].cum);
  const maxAbs = Math.max(1, ...deltas.map(Math.abs));
  const dailyBars = eqp.map((p, i) => ({
    val: fmt(deltas[i]),
    h: Math.max(4, Math.round(Math.abs(deltas[i]) / maxAbs * 100)),
    color: deltas[i] >= 0 ? GREEN : RED,
    label: p.date
  }));

  /* KPIs */
  const kpis = [
    { label: "Win rate", value: hasTrades ? wr + "%" : dash, sub: wins + "W / " + losses + "L", color: TXT },
    { label: "Profit factor", value: hasTrades ? pf.toFixed(2) + "×" : dash, sub: fmtAbs(totWins) + " / " + fmtAbs(totLoss), color: !hasTrades ? TXT : pf >= 1.5 ? GREEN : pf >= 1 ? TXT : RED },
    { label: "Expectancy", value: hasTrades ? (rExp >= 0 ? "+" : "−") + Math.abs(rExp).toFixed(2) + "R" : dash, sub: hasTrades ? fmt(expectancy) + " / trade" : "par trade", color: !hasTrades ? TXT : rExp >= 0 ? GREEN : RED },
    { label: "Payoff", value: hasTrades ? payoff.toFixed(2) : dash, sub: "gain moyen / perte moyenne", color: TXT },
    { label: "Max drawdown", value: hasTrades ? "−" + fmtAbs(maxDD) : dash, sub: hasTrades ? "pic " + fmt(peakT) : "creux equity", color: hasTrades ? RED : TXT },
    { label: "Discipline", value: adher === null ? dash : adher + "%", sub: adher === null ? "process propre" : cleanN + " / " + annot.length + " process propre", color: adher === null ? TXT : adher >= 80 ? GREEN : ACC }
  ];

  /* journal des trades */
  const isDirty = t => t.processClean === false || (Array.isArray(t.violations) && t.violations.length > 0);
  const anyDirty = trades.some(isDirty);
  const filters = [["all", "Tous"], ["win", "Gagnants"], ["loss", "Perdants"]];
  if (anyDirty) filters.push(["dirty", "Hors-process"]);
  const tradeFilters = filters.map(([id, label]) => ({ id, label, on: S.tradeFilter === id }));
  const visible = trades.map((t, i) => ({ t, i })).filter(({ t }) => {
    const v = plOf(t);
    if (S.tradeFilter === "win") return v > 0;
    if (S.tradeFilter === "loss") return v < 0;
    if (S.tradeFilter === "dirty") return isDirty(t);
    return true;
  }).reverse();
  const tradesList = visible.map(({ t, i }) => {
    const v = plOf(t) || 0;
    const r = hasTrades ? v / oneR : 0;
    const open = S.openTrade === i;
    const viol = Array.isArray(t.violations) && t.violations.length ? t.violations : null;
    const clean = cleanOf(t);
    return {
      i, open,
      date: String(t.date || "").replace(" 2026", ""),
      dir: t.dir || "", dirColor: t.dir === "Long" ? GREEN : RED,
      setupType: t.setupType || t.setup || "—",
      kz: t.kz || "—",
      r: (r >= 0 ? "+" : "−") + Math.abs(r).toFixed(1) + "R", rColor: r >= 0 ? GREEN : RED,
      pl: t.pl || "", plColor: v >= 0 ? GREEN : RED,
      dotColor: clean === false ? RED : clean === true ? GREEN : "var(--border2)",
      dotTitle: viol ? viol.join(" · ") : clean === false ? "Hors-process" : clean === true ? "Process propre" : "Non annoté",
      instr: t.instr || "", entryExit: (t.entry || "—") + " → " + (t.exit || "—"),
      contractsTxt: t.contracts ? t.contracts + " contrats" : "",
      moodTxt: t.mood ? "Mood · " + t.mood : "",
      taggedTxt: t.taggedBy === "declaration" ? "déclaré en session" : t.taggedBy === "override" ? "override manuel" : t.taggedBy === "auto" ? "non déclaré en session" : "",
      procTxt: viol ? "⚠ " + viol.join(" · ") : clean === false ? "Hors-process" : clean === true ? "Process propre" : "",
      procColor: clean === false ? RED : GREEN,
      setup: t.setup || "—", notes: t.notes || ""
    };
  });
  const tradeStatsLine = hasTrades
    ? "Gain moyen +" + fmtAbs(avgWin) + " · Perte moyenne −" + fmtAbs(avgLoss) +
      " · Meilleur " + fmt(Math.max(0, ...winPLs, 0)) + " · Pire " + fmt(Math.min(0, ...lossPLs, 0))
    : "";
  const emptyTradesNote = hasTrades
    ? "Aucun trade ne correspond au filtre."
    : "Le pipeline (tools/update_dashboard.py) repeuplera le journal — marqueurs &lt;TRADES&gt; / &lt;EQUITY&gt; inchangés." +
      (S.demo ? "" : '<div style="margin-top:12px"><button class="chip" data-act="demo">Afficher les données démo</button></div>');

  /* sessions */
  const sessionsList = sessions.map((s, i) => {
    const plStr = s.pl || dash;
    return {
      i, open: !!S.openSessions[i],
      date: s.date, statusLabel: s.statusLabel || "Clôturée",
      pl: plStr, plColor: plStr.startsWith("+") ? GREEN : (plStr.startsWith("−") || plStr.startsWith("-")) ? RED : MUT,
      plSub: s.plSub || "", bodyHtml: rich(s.html)
    };
  });

  /* playbook */
  const rules = DATA.rules || [];
  const rulesCrit = rules.filter(r => r.critical);
  const rulesOp = rules.filter(r => !r.critical);

  /* préparation */
  const wp = DATA.weekPlan || null;
  const planTfs = wp ? (wp.timeframes || []).map(tf => ({
    tf: tf.tf, title: tf.title, img: tf.img || "",
    imgNote: "capture locale — " + (tf.img || "à venir"),
    noteHtml: rich(tf.note), levels: tf.levels || []
  })) : [];
  const resMap = { valid: ["Setup validé", GREEN], invalid: ["Invalidé", RED], neutral: ["Neutre / mixte", ACC] };
  const btsSorted = (DATA.backtests || []).map((bt, i) => ({ bt, i }))
    .sort((a, b) => (frTime(b.bt.date) - frTime(a.bt.date)) || (a.i - b.i));
  const backtestsList = btsSorted.map(({ bt }, idx) => {
    const res = resMap[bt.result] || ["", MUT];
    return {
      idx, open: !!S.openBts[idx],
      date: bt.date, title: bt.title || bt.setup || "",
      resLabel: res[0], resColor: res[1],
      tags: [bt.instrument, bt.timeframe, bt.setup].filter(Boolean),
      bodyHtml: rich(bt.comment),
      lessons: (bt.lessons || []).map(l => ({
        color: l.type === "pos" ? GREEN : l.type === "neg" ? RED : ACC,
        label: l.type === "pos" ? "Point fort" : l.type === "neg" ? "Erreur" : "Note",
        text: l.text
      })),
      images: (bt.images || []).map(im => ({ src: im.src, caption: im.caption || "" }))
    };
  });
  const anyBtClosed = btsSorted.some((_, idx) => !S.openBts[idx]);

  /* compte : conformité */
  const acctId = S.acct || (active && active.propFirmId) || (propFirms[0] && propFirms[0].id);
  const acct = propFirms.find(p => p.id === acctId) || propFirms[0] || null;
  const accountChips = propFirms.map(p => ({
    id: p.id, on: !!(acct && p.id === acct.id),
    label: p.firm + " " + ((p.plan.match(/\d+K/) || [p.plan])[0])
  }));
  const okS = { color: GREEN, bg: "var(--green-soft)" }, badS = { color: RED, bg: "var(--red-soft)" },
        accS = { color: ACC, bg: "var(--accent-soft)" }, naS = { color: MUT, bg: "var(--hover)" };
  const comp = (p) => {
    if (!p) return { rows: [], margin: 0, bestDay: 0 };
    const bals = (equity.length ? equity : [{ cum: 0 }]).map(pt => p.accountSize + pt.cum);
    let hw = p.accountSize, breach = false, thr = p.accountSize - p.mll;
    bals.forEach(b => { hw = Math.max(hw, b); thr = p.ddModel === "static" ? p.accountSize - p.mll : Math.min(p.accountSize, hw - p.mll); if (b <= thr) breach = true; });
    const curBal = bals[bals.length - 1], margin = curBal - thr;
    const dts = (equity.length ? equity : [{ cum: 0 }]).map((pt, i, arr) => i === 0 ? pt.cum : pt.cum - arr[i - 1].cum);
    const worstDay = Math.min(0, ...dts), bestDay = Math.max(0, ...dts);
    const tPct = p.profitTarget ? Math.max(0, Math.min(100, Math.round(100 * cum / p.profitTarget))) : 0;
    const tOk = cum >= p.profitTarget;
    const dllOn = p.dailyLossLimit != null;
    const dllBreach = dllOn && dts.some(v => v <= -p.dailyLossLimit);
    const consDen = p.consistencyBasis === "target" ? p.profitTarget : Math.max(cum, 1);
    const consPct = consDen > 0 ? Math.round(100 * bestDay / consDen) : 0;
    const consOk = !tOk || consPct <= (p.consistencyPct || 50);
    const winDays = dts.filter(v => v >= (p.winDayThreshold || 150)).length;
    const cKnown = trades.some(t => typeof t.contracts === "number");
    const cMax = cKnown ? Math.max(0, ...trades.map(t => t.contracts || 0)) : null;
    const rows = [
      { name: "Objectif de profit", sub: "Atteindre +" + fmtAbs(p.profitTarget) + " net",
        val: fmt(cum) + " (" + tPct + "%)", status: tOk ? "Atteint" : "En cours", ...(tOk ? okS : accS) },
      { name: "Maximum Loss Limit", sub: (p.ddModel === "static" ? "Statique" : "Trailing EOD") + " −" + fmtAbs(p.mll) + " · seuil " + fmtAbs(thr),
        val: "marge " + fmtAbs(margin), status: breach ? "Franchi" : "Sain", ...(breach ? badS : okS) },
      dllOn
        ? { name: "Daily Loss Limit", sub: (p.dllOptional ? "Option du Combine (informatif) · " : "") + "pire journée " + fmt(worstDay),
            val: "−" + fmtAbs(p.dailyLossLimit), status: dllBreach ? (p.dllOptional ? "Dépassée (option)" : "Franchi") : "Respecté",
            ...(dllBreach ? (p.dllOptional ? accS : badS) : okS) }
        : { name: "Daily Loss Limit", sub: "Pas de DLL sur ce plan", val: dash, status: "n/a", ...naS },
      { name: "Consistance ≤ " + (p.consistencyPct || 50) + "%" + (p.consistencyBasis === "target" ? " de l'objectif" : " du profit"),
        sub: "Meilleure journée " + fmt(bestDay) + " = " + consPct + "%" + (tOk ? "" : " · vérifiée à l'atteinte de l'objectif"),
        val: consPct + "%", status: consOk ? "OK" : "Dépassé", ...(consOk ? okS : badS) },
      p.minWinDays != null
        ? { name: "Jours gagnants (payout)", sub: "Critère de payout du financé · jour ≥ " + fmtAbs(p.winDayThreshold || 150) + " net",
            val: winDays + " / " + p.minWinDays, status: winDays >= p.minWinDays ? "OK" : "En cours", ...(winDays >= p.minWinDays ? okS : accS) }
        : { name: "Jours gagnants", sub: "Non applicable sur ce plan", val: dash, status: "n/a", ...naS },
      { name: "Limite de contrats (" + p.maxContracts + " max)", sub: cKnown ? "Max utilisé sur la période : " + cMax : "Champ « contracts » non renseigné",
        val: cKnown ? cMax + " / " + p.maxContracts : dash,
        status: !cKnown ? "n/a" : cMax <= p.maxContracts ? "Respecté" : "Dépassé", ...(!cKnown ? naS : cMax <= p.maxContracts ? okS : badS) },
      { name: "Flat à la clôture", sub: "Avant " + p.flatByCT + " " + (p.flatTz || "CT") + " — jamais d'overnight", val: dash, status: "manuel", ...naS }
    ];
    return { rows, margin, bestDay, breach, tPct };
  };
  const acctComp = comp(acct);
  const activeComp = activePf ? (acct && activePf.id === acct.id ? acctComp : comp(activePf)) : null;

  /* money management */
  const mm = meta.mm || null;
  let mmStats = [], sizingHead = [], sizingRows = [], mmNote = "", mmProfile = "";
  if (mm && acct) {
    const dailyStop = acct.dailyLossLimit != null
      ? Math.round(Math.min(acct.dailyLossLimit * mm.dailyStopPctOfDLL, acct.mll / mm.minBufferDays))
      : Math.round(acct.mll / mm.minBufferDays);
    const risk = Math.round(dailyStop / mm.riskTradesPerDay);
    const buffer = Math.floor(acct.mll / dailyStop);
    const gainCap = Math.round(acct.profitTarget * mm.dailyGainPctOfTarget);
    mmProfile = mm.profile || "";
    mmStats = [
      { label: "Risque par trade", value: fmtAbs(risk), sub: "fixe — jamais augmenté après une perte" },
      { label: "Stop quotidien perso", value: fmtAbs(dailyStop), sub: acct.dailyLossLimit != null ? Math.round(100 * dailyStop / acct.dailyLossLimit) + "% du DLL " + fmtAbs(acct.dailyLossLimit) : "pas de DLL — MLL ÷ " + mm.minBufferDays },
      { label: "Plafond de gain / jour", value: fmtAbs(gainCap), sub: "protège la consistance " + (acct.consistencyPct || 50) + "%" },
      { label: "Marge avant blow-up", value: buffer + " j", sub: "journées rouges pleines · MLL " + fmtAbs(acct.mll) }
    ];
    sizingHead = mm.instruments.map(i => i.label);
    sizingRows = mm.stopGrid.map(sp => ({
      stop: sp + " pts",
      cells: mm.instruments.map(inst => {
        const cap = inst.micro ? acct.maxContracts * 10 : acct.maxContracts;
        let n = Math.floor(risk / (sp * inst.perPt));
        const capped = n > cap; if (capped) n = cap;
        return n < 1 ? { txt: "—", color: MUT }
          : { txt: n + (capped ? "⤒" : "") + " (" + fmtAbs(n * sp * inst.perPt) + ")", color: TXT };
      })
    }));
    mmNote = "Cellule = contrats au risque " + fmtAbs(risk) + " (risque réel entre parenthèses). « — » = stop trop large pour 1 contrat → réduire le stop ou passer en micro. « ⤒ » = plafonné à la limite " + acct.firm + ". Profil éditable dans meta.mm (bloc DATA de ce fichier).";
  }

  /* historique des tentatives */
  const stMap = { passed: ["Réussi", GREEN, "var(--green-soft)"], failed: ["Raté", RED, "var(--red-soft)"], active: ["En cours", ACC, "var(--accent-soft)"] };
  const challengesList = challenges.slice().reverse().map(ch => {
    const st = stMap[ch.status] || ["—", MUT, "var(--hover)"];
    return { title: ch.firm + " · " + ch.plan, statusLabel: st[0], dot: st[1], bg: st[2],
      period: (ch.startDate || "—") + " → " + (ch.endDate || "en cours"), note: ch.note || "" };
  });
  const nPass = challenges.filter(c => c.status === "passed").length;
  const nFail = challenges.filter(c => c.status === "failed").length;
  const nAct = challenges.filter(c => c.status === "active").length;

  return {
    demoUsed, periodLabel,
    heroLabel, heroPl, heroColor, heroSub,
    hasTarget: !!(active && target), targetLabel: "+" + fmtAbs(target), targetPct, targetColor,
    hasTrades, multiDay: hasTrades && eqp.length > 1,
    eqPts, eqArea, gridSvg,
    eqStroke: up ? GREEN : RED, eqFill: up ? "var(--green-soft)" : "var(--red-soft)",
    eqStart: eqp[0].date, eqEnd: eqp[eqp.length - 1].date,
    peakLabel: fmt(Math.max(0, ...cums)), ddMaxLabel: fmtAbs(maxDD),
    dailyBars, kpis,
    tradeCount: visible.length + (visible.length === trades.length ? "" : " / " + trades.length),
    tradeFilters, tradesList, tradeStatsLine, emptyTradesNote,
    sessionsList,
    rulesCrit, rulesOp,
    hasPlan: !!wp, planTitle: wp ? wp.date + " · " + wp.instrument : "", planBias: wp ? wp.bias : "",
    planSummaryHtml: wp ? rich(wp.summary) : "",
    planTfs, backtestsList, anyBtClosed,
    hasActive: !!active,
    activeTitle: active ? active.firm + " · " + active.plan : "",
    activePeriod: active ? (active.startDate || "—") + " → " + (active.endDate || "en cours") : "",
    activeNote: active ? (active.note || "") : "",
    targetSub: "objectif +" + fmtAbs(target) + " · " + targetPct + "%",
    mllMargin: activeComp ? fmtAbs(activeComp.margin) : dash,
    mllColor: activeComp && activeComp.margin <= (activePf ? activePf.mll * 0.5 : 0) ? RED : GREEN,
    mllSub: activePf ? "MLL trailing −" + fmtAbs(activePf.mll) : "",
    bestDayTxt: activeComp ? fmt(activeComp.bestDay) : dash,
    bestDaySub: activePf ? "plafond consistance " + fmtAbs(activePf.profitTarget * (activePf.consistencyPct || 50) / 100) : "",
    accountChips, complianceRows: acctComp.rows,
    mmProfile, mmStats, sizingHead, sizingRows, mmNote,
    challengesList, challSummary: nPass + " réussie(s) · " + nFail + " ratée(s) · " + nAct + " en cours"
  };
}

/* ── recherche de concepts (rendu partiel pour garder le focus) ── */
function conceptItems(q) {
  const all = DATA.concepts || [];
  const qq = String(q || "").trim().toLowerCase();
  return all.filter(c => !qq || (c.label + " " + c.text).toLowerCase().includes(qq));
}
function conceptListHtml(items) {
  if (!items.length) return '<div style="padding:44px 20px;text-align:center;color:var(--muted);font-size:13px">Aucun concept ne correspond à la recherche.</div>';
  return items.map(c => '<div class="concept"><div style="font-size:14px;font-weight:600;margin-bottom:7px">' + esc(c.label) + '</div>' + rich(c.text) + '</div>').join("");
}

const MOON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
const LOGO = '<svg width="24" height="24" viewBox="0 0 32 32" aria-hidden="true"><rect width="32" height="32" rx="7" fill="var(--text)"></rect><path d="M6 8 L6 24 L11 24 Q20 24 20 16 Q20 8 11 8 Z" fill="var(--bg)"></path><rect x="22" y="8" width="4" height="16" fill="var(--bg)"></rect></svg>';

function topbar(D) {
  return '<div class="topbar"><div class="wrap topbar-in">'
    + '<div class="brand">' + LOGO + '<div class="brand-name">Diary of an ICT Trader</div></div>'
    + '<nav class="tabs" aria-label="Navigation">'
    + VIEWS.map(([id, label]) => '<button class="tab' + (S.view === id ? " on" : "") + '" data-go="' + id + '">' + label + '</button>').join("")
    + '</nav><div class="top-right">'
    + (D.demoUsed ? '<span class="demo-badge" data-act="demo" title="Données de démonstration (le journal réel est vide) — cliquer pour repasser à l\'état réel">DÉMO</span>' : "")
    + '<div class="period">' + esc(D.periodLabel) + '</div>'
    + '<button class="theme-btn" data-act="theme" aria-label="Basculer le thème clair / sombre">' + (S.dark ? SUN : MOON) + '</button>'
    + '</div></div></div>';
}

function vApercu(D) {
  let h = '<section><header class="hero"><div>'
    + '<div class="lbl">' + esc(D.heroLabel) + '</div>'
    + '<div class="hero-pl" style="color:' + D.heroColor + '">' + esc(D.heroPl) + '</div>'
    + '<div class="hero-sub">' + esc(D.heroSub) + '</div>';
  if (D.hasTarget) {
    h += '<div class="target-wrap"><div class="target-head"><span>Objectif ' + esc(D.targetLabel) + '</span><span style="color:' + D.targetColor + ';font-weight:600">' + D.targetPct + '%</span></div>'
      + '<div class="bar"><div style="width:' + D.targetPct + '%;background:' + D.targetColor + '"></div></div></div>';
  }
  h += '</div><div>';
  if (D.hasTrades) {
    h += '<div class="eq-head"><span class="lbl">Equity — cumul</span><span class="small-muted mono">pic ' + esc(D.peakLabel) + ' · DD max −' + esc(D.ddMaxLabel) + '</span></div>'

      + '<div class="eq-x"><span>' + esc(D.eqStart) + '</span><span>' + esc(D.eqEnd) + '</span></div>';
  } else {

  if (D.multiDay) {
    h += '<section style="margin-top:48px"><h2 class="h2" style="margin-bottom:18px">P&amp;L par jour</h2><div class="bars">'
      + D.dailyBars.map(b => '<div class="barcol"><div class="barval" style="color:' + b.color + '">' + esc(b.val) + '</div><div class="barwrap"><div class="barfill" style="height:' + b.h + '%;background:' + b.color + '"></div></div><div class="barlbl">' + esc(b.label) + '</div></div>').join("")
      + '</div></section>';
  }
  h += '<section style="margin-top:48px"><div class="sec-head"><h2 class="h2">Trades <span style="color:var(--muted);font-weight:400;font-size:12px">· ' + esc(String(D.tradeCount)) + '</span></h2><div class="chips">'

    h += '<div class="card tablewrap"><div class="tgrid thead"><div>Date</div><div>Sens</div><div>Setup</div><div>Kill Zone</div><div class="right">R</div><div class="right">P/L</div><div></div></div>';
    for (const t of D.tradesList) {
      h += '<div><div class="tgrid trow" data-trade="' + t.i + '">'

        + '<div style="font-size:12px;font-weight:600;color:' + t.dirColor + '">' + esc(t.dir) + '</div>'

        + '<div class="num right" style="font-size:13px;font-weight:600;color:' + t.plColor + '">' + esc(t.pl) + '</div>'
        + '<div style="display:flex;justify-content:flex-end;align-items:center;gap:7px"><span class="dot" title="' + esc(t.dotTitle) + '" style="background:' + t.dotColor + '"></span><span class="caret' + (t.open ? " open" : "") + '">▶</span></div>'
        + '</div>';

        h += '<div class="tdetail"><div class="tmeta">';
        for (const x of [t.instr, t.entryExit, t.contractsTxt, t.moodTxt, t.taggedTxt]) if (x) h += '<span>' + esc(x) + '</span>';
        if (t.procTxt) h += '<span style="color:' + t.procColor + ';font-weight:600">' + esc(t.procTxt) + '</span>';
        h += '</div><div style="font-size:12.5px;line-height:1.65"><strong style="font-weight:600">Setup — </strong>' + esc(t.setup) + '</div>'

}

      + '<div class="mono right" style="font-size:12.5px;white-space:nowrap">' + esc(row.val) + '</div>'
      + '<div style="min-width:92px;text-align:right"><span class="pill" style="color:' + row.color + ';background:' + row.bg + '">' + esc(row.status) + '</span></div></div>').join("")
    + '<div style="font-size:11px;color:var(--muted);padding:11px 0;line-height:1.6">Calcul en clôture de journée (EOD) sur la courbe d\'equity du journal. Seuils éditables dans meta.propFirms.</div>'
    + '</div></section>';
  if (D.mmStats.length) {

  return h + '</section>';

function render() {
  const D = compute();
  let main;
  if (S.view === "journal") main = vJournal(D);
  else if (S.view === "preparation") main = vPrep(D);
  else if (S.view === "playbook") main = vPlaybook(D);
  else if (S.view === "compte") main = vCompte(D);
  else main = vApercu(D);
  document.getElementById("app").innerHTML =
    topbar(D) + '<main class="wrap main">' + main + '</main>'
    + '<footer class="footer">NQ · ES — Sierra Chart · SIM (P/L réels) — données régénérées par tools/update_dashboard.py</footer>';
}

/* ── interactions ── */
function goView(v) {
  if (!VIEW_IDS.includes(v)) return;
  S.view = v;
  try { localStorage.setItem("ict-tab-v2", v); } catch (e) {}
  if (location.hash !== "#" + v) history.replaceState(null, "", "#" + v);
  render();
  window.scrollTo(0, 0);
}
function setTheme(dark) {
  if (dark) document.documentElement.setAttribute("data-theme", "dark");
  else document.documentElement.removeAttribute("data-theme");
  try { localStorage.setItem("ict-theme", dark ? "dark" : "light"); } catch (e) {}
  S.dark = dark;
  render();
}
function openLightbox(src) {
  if (!src) return;
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("open");
}
function toggleAllBts() {
  const n = (DATA.backtests || []).length;
  let anyClosed = false;
  for (let i = 0; i < n; i++) if (!S.openBts[i]) anyClosed = true;
  const all = {};
  if (anyClosed) for (let i = 0; i < n; i++) all[i] = true;
  S.openBts = all;
  render();
}

document.addEventListener("click", e => {
  if (e.target.closest("#lightbox")) { document.getElementById("lightbox").classList.remove("open"); return; }
  const zoom = e.target.closest("[data-zoom]");
  if (zoom) { openLightbox(zoom.getAttribute("data-zoom")); return; }
  if (e.target.tagName === "IMG" && e.target.closest(".rich")) { openLightbox(e.target.getAttribute("src")); return; }
  const go = e.target.closest("[data-go]");
  if (go) { goView(go.getAttribute("data-go")); return; }
  const act = e.target.closest("[data-act]");
  if (act) {
    const a = act.getAttribute("data-act");
    if (a === "theme") setTheme(!S.dark);
    else if (a === "demo") {
      S.demo = !S.demo;
      try { localStorage.setItem("ict-demo", S.demo ? "on" : "off"); } catch (err) {}
      render();
    }
    else if (a === "allbts") toggleAllBts();
    return;
  }
  const f = e.target.closest("[data-filter]");
  if (f) { S.tradeFilter = f.getAttribute("data-filter"); S.openTrade = null; render(); return; }
  const tr = e.target.closest("[data-trade]");
  if (tr) { const i = +tr.getAttribute("data-trade"); S.openTrade = S.openTrade === i ? null : i; render(); return; }
  const se = e.target.closest("[data-session]");
  if (se) { const i = +se.getAttribute("data-session"); S.openSessions[i] = !S.openSessions[i]; render(); return; }
  const bt = e.target.closest("[data-bt]");
  if (bt) { const i = +bt.getAttribute("data-bt"); S.openBts[i] = !S.openBts[i]; render(); return; }
  const ac = e.target.closest("[data-acct]");
  if (ac) { S.acct = ac.getAttribute("data-acct"); render(); return; }
});

document.addEventListener("input", e => {
  if (e.target && e.target.id === "concept-q") {
    S.q = e.target.value;
    const items = conceptItems(S.q);
    const res = document.getElementById("concept-results");
    if (res) res.innerHTML = conceptListHtml(items);
    const cnt = document.getElementById("concept-count");
    if (cnt) cnt.textContent = items.length + " / " + (DATA.concepts || []).length;
  }
});

window.addEventListener("hashchange", () => {
  const v = (location.hash || "").replace("#", "");
  if (VIEW_IDS.includes(v) && v !== S.view) { S.view = v; render(); window.scrollTo(0, 0); }
});

render();
</script>
